{% extends "base.html" %}
{% block title %}Sign in — {{ site_name }}{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Sign in</h1>
  <p class="muted">Enter your work email. We'll send you a sign-in link.</p>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/login" class="stack">
    <label>
      Email
      <input type="email" name="email" required autocomplete="email" autofocus>
    </label>
    <button type="submit" class="primary">Send sign-in link</button>
  </form>
</div>
{% endblock %}
