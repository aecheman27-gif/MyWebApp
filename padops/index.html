<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Specialist Turnover — DCS shift turnover & task tracking for launch pad operations">
<title>Specialist Turnover</title>
<!--
  Specialist Turnover — single-file shift turnover web app.
  Tech: Vanilla JS + HTML/CSS. No build step. No framework.
  External deps: Google Fonts (CDN, with system-font fallback).
  Rich text editor: built on contenteditable + execCommand (the spec-sanctioned
  fallback) so the app runs fully offline / air-gapped with zero external JS.
  Storage: localStorage (text/metadata) + IndexedDB (binary: attachments,
  embedded images, note version snapshots). Schema migration runner on load.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   1. DESIGN TOKENS — SpaceX / Cyberpunk fusion
   ========================================================================== */
:root {
  /* Base surfaces */
  --bg-void: #050810;
  --bg-surface: #0a0e1a;
  --bg-elevated: #0f1525;
  --bg-glass: rgba(10, 14, 26, 0.72);

  /* Neon accents — used sparingly, only for active/interactive states */
  --neon-cyan: #00f5ff;
  --neon-magenta: #ff006e;
  --neon-yellow: #ffe600;
  --neon-green: #00ff94;

  /* Status column colors */
  --col-inwork: #0066ff;
  --col-queue: #7c84d8;
  --col-hold: #ff8800;
  --col-awaiting: #9b59ff;
  --col-complete: #00ff94;
  --col-needs-planning: #13c2c2;   /* teal — Needs Planning */

  /* SpaceX brand */
  --spacex-red: #e31937;
  --spacex-white: #f0f0f0;

  /* Text */
  --text-primary: #e8eaf0;
  --text-secondary: #7a8099;
  --text-muted: #3d4460;
  --text-neon: #00f5ff;

  /* Borders */
  --border-default: rgba(0, 245, 255, 0.08);
  --border-active: rgba(0, 245, 255, 0.35);
  --border-glow: rgba(0, 245, 255, 0.6);

  /* Glows */
  --glow-cyan-sm: 0 0 8px rgba(0, 245, 255, 0.4);
  --glow-cyan-md: 0 0 20px rgba(0, 245, 255, 0.25), 0 0 40px rgba(0, 245, 255, 0.1);
  --glow-magenta: 0 0 12px rgba(255, 0, 110, 0.5);
  --glow-card: 0 4px 24px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.03);

  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --font-body: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  --radius: 4px;
  --header-h: 116px;
}

/* Light mode — "day mode" of the same aesthetic */
html[data-theme="light"] {
  --bg-void: #f0f4ff;
  --bg-surface: #e8edf8;
  --bg-elevated: #dce4f5;
  --bg-glass: rgba(232, 237, 248, 0.82);
  --neon-cyan: #0066ff;
  --neon-magenta: #cc0055;
  --neon-green: #00aa66;
  --neon-yellow: #b58900;
  --text-primary: #0a0e1a;
  --text-secondary: #2a3050;
  --text-muted: #8a93b0;
  --text-neon: #0066ff;
  --border-default: rgba(0, 102, 255, 0.15);
  --border-active: rgba(0, 102, 255, 0.35);
  --border-glow: rgba(0, 102, 255, 0.6);
  --col-queue: #5b63b8;
}

/* Accent color schemes — re-tint the primary neon accent + cyan-derived tokens.
   (Cyan is the default and needs no override.) */
html[data-accent="green"] {
  --neon-cyan: #00ff94; --text-neon: #00ff94;
  --border-default: rgba(0,255,148,0.08); --border-active: rgba(0,255,148,0.35); --border-glow: rgba(0,255,148,0.6);
  --glow-cyan-sm: 0 0 8px rgba(0,255,148,0.4); --glow-cyan-md: 0 0 20px rgba(0,255,148,0.25), 0 0 40px rgba(0,255,148,0.1);
}
html[data-accent="amber"] {
  --neon-cyan: #ffaa00; --text-neon: #ffaa00;
  --border-default: rgba(255,170,0,0.1); --border-active: rgba(255,170,0,0.4); --border-glow: rgba(255,170,0,0.6);
  --glow-cyan-sm: 0 0 8px rgba(255,170,0,0.4); --glow-cyan-md: 0 0 20px rgba(255,170,0,0.25), 0 0 40px rgba(255,170,0,0.1);
}
html[data-accent="magenta"] {
  --neon-cyan: #ff006e; --text-neon: #ff4d94;
  --border-default: rgba(255,0,110,0.1); --border-active: rgba(255,0,110,0.4); --border-glow: rgba(255,0,110,0.6);
  --glow-cyan-sm: 0 0 8px rgba(255,0,110,0.4); --glow-cyan-md: 0 0 20px rgba(255,0,110,0.25), 0 0 40px rgba(255,0,110,0.1);
}
html[data-accent="violet"] {
  --neon-cyan: #9b59ff; --text-neon: #b388ff;
  --border-default: rgba(155,89,255,0.1); --border-active: rgba(155,89,255,0.4); --border-glow: rgba(155,89,255,0.6);
  --glow-cyan-sm: 0 0 8px rgba(155,89,255,0.4); --glow-cyan-md: 0 0 20px rgba(155,89,255,0.25), 0 0 40px rgba(155,89,255,0.1);
}

/* Rich named themes — change accent AND surface/background tone for a distinct feel */
html[data-accent="space"] {
  --neon-cyan:#5b9dff; --text-neon:#8fbaff;
  --border-default:rgba(91,157,255,0.1); --border-active:rgba(91,157,255,0.4); --border-glow:rgba(91,157,255,0.6);
  --glow-cyan-sm:0 0 8px rgba(91,157,255,0.45); --glow-cyan-md:0 0 20px rgba(91,157,255,0.28),0 0 40px rgba(91,157,255,0.12);
  --bg-void:#03050d; --bg-surface:#070b18; --bg-elevated:#0b1124; --bg-glass:rgba(7,11,24,0.72);
}
html[data-accent="space"] #bg-canvas { background:radial-gradient(ellipse at 30% 30%, #0a1638 0%, #03050d 65%); }

html[data-accent="launch"] {
  --neon-cyan:#ff7a18; --text-neon:#ffb066;
  --border-default:rgba(255,122,24,0.12); --border-active:rgba(255,122,24,0.42); --border-glow:rgba(255,122,24,0.6);
  --glow-cyan-sm:0 0 8px rgba(255,122,24,0.5); --glow-cyan-md:0 0 22px rgba(255,122,24,0.3),0 0 44px rgba(255,90,0,0.14);
  --bg-void:#0c0803; --bg-surface:#140d05; --bg-elevated:#1c1308; --bg-glass:rgba(20,13,5,0.72);
}
html[data-accent="launch"] #bg-canvas { background:radial-gradient(ellipse at 50% 92%, #3a1c05 0%, #0c0803 60%); }

html[data-accent="mars"] {
  --neon-cyan:#ff5733; --text-neon:#ff8a66;
  --border-default:rgba(255,87,51,0.12); --border-active:rgba(255,87,51,0.42); --border-glow:rgba(255,87,51,0.6);
  --glow-cyan-sm:0 0 8px rgba(255,87,51,0.5); --glow-cyan-md:0 0 22px rgba(255,87,51,0.3),0 0 44px rgba(255,87,51,0.14);
  --bg-void:#0e0604; --bg-surface:#170a06; --bg-elevated:#200f09; --bg-glass:rgba(23,10,6,0.72);
}
html[data-accent="mars"] #bg-canvas { background:radial-gradient(ellipse at 40% 40%, #3d1409 0%, #0e0604 62%); }

html[data-accent="moon"] {
  --neon-cyan:#aebfd6; --text-neon:#d8e2f0;
  --border-default:rgba(174,191,214,0.12); --border-active:rgba(174,191,214,0.4); --border-glow:rgba(174,191,214,0.55);
  --glow-cyan-sm:0 0 8px rgba(174,191,214,0.4); --glow-cyan-md:0 0 20px rgba(174,191,214,0.22),0 0 40px rgba(174,191,214,0.1);
  --bg-void:#07090e; --bg-surface:#0d1118; --bg-elevated:#141a24; --bg-glass:rgba(13,17,24,0.72);
}
html[data-accent="moon"] #bg-canvas { background:radial-gradient(ellipse at 62% 32%, #1b2333 0%, #07090e 62%); }

html[data-accent="falcon9"] {
  --neon-cyan:#e31937; --text-neon:#f0f0f0;
  --border-default:rgba(240,240,240,0.1); --border-active:rgba(240,240,240,0.3); --border-glow:rgba(227,25,55,0.6);
  --glow-cyan-sm:0 0 8px rgba(227,25,55,0.5); --glow-cyan-md:0 0 20px rgba(227,25,55,0.3),0 0 40px rgba(227,25,55,0.12);
  --bg-void:#000000; --bg-surface:#0a0a0a; --bg-elevated:#151515; --bg-glass:rgba(10,10,10,0.74);
}
html[data-accent="falcon9"] #bg-canvas { background:radial-gradient(ellipse at 50% 50%, #1a0a0d 0%, #000000 70%); }
.color-swatch.sel { outline: 2px solid var(--text-primary); outline-offset: 1px; }

/* ============================================================================
   2. RESET / BASE
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: var(--neon-cyan); text-decoration: none; }
.mono { font-family: var(--font-mono); letter-spacing: 0.08em; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.25); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,245,255,0.5); }

:focus-visible {
  outline: 1.5px solid var(--neon-cyan);
  outline-offset: 2px;
  box-shadow: 0 0 0 3px rgba(0,245,255,0.15);
}

/* ============================================================================
   3. ANIMATED BACKGROUND (5-layer)
   ========================================================================== */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 50%, #090d1f 0%, #050810 60%);
}
html[data-theme="light"] #bg-canvas {
  background: radial-gradient(ellipse at 20% 50%, #f4f7ff 0%, #e8edf8 60%);
}
#starfield { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.bg-grid {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: grid-drift 120s linear infinite;
  opacity: 0.6; will-change: transform;
}
@keyframes grid-drift { from { background-position: 0 0; } to { background-position: 0 -800px; } }
.bg-scanline {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: linear-gradient(to bottom, transparent 0%, rgba(0,245,255,0.04) 50%, transparent 100%);
  height: 200px; opacity: 0; will-change: transform;
  animation: scan 45s linear infinite;
}
@keyframes scan {
  0% { transform: translateY(-200px); opacity: 0; }
  5% { opacity: 1; } 95% { opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .bg-grid, .bg-scanline { animation: none !important; }
  * { animation-duration: 0.001s !important; animation-iteration-count: 1 !important; }
}

#app { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; }

/* ============================================================================
   4. HEADER / HUD
   ========================================================================== */
header.hud {
  background: rgba(5,8,16,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
  padding: 8px 16px;
  position: relative;   /* establish stacking above the board so header dropdowns render on top */
  z-index: 100;
}
html[data-theme="light"] header.hud { background: rgba(232,237,248,0.92); }
.hud-row { display: flex; align-items: center; gap: 16px; }
.hud-row.top { margin-bottom: 8px; }
.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand .logo {
  font-family: var(--font-mono); font-weight: 700; font-size: 18px; letter-spacing: 0.12em;
  color: var(--text-primary); text-transform: uppercase;
}
.brand .logo .accent { color: var(--neon-cyan); }
.heartbeat { width: 40px; height: 20px; opacity: 0.5; }
.heartbeat path { stroke: var(--neon-cyan); stroke-width: 1.5; fill: none;
  stroke-dasharray: 100; animation: ecg 4s linear infinite; }
@keyframes ecg { 0% { stroke-dashoffset: 100; } 60% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -100; } }

.clock-block { display: flex; align-items: baseline; gap: 14px; }
.clock { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: var(--neon-cyan);
  text-shadow: 0 0 12px rgba(0,245,255,0.4); letter-spacing: 0.06em; }
.countdown { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.06em; color: var(--text-secondary); }
.countdown.warn { color: var(--neon-yellow); }
.countdown.crit { color: var(--neon-magenta); text-shadow: 0 0 8px rgba(255,0,110,0.6); }

.shift-indicator { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em;
  padding: 4px 10px; border: 1px solid var(--border-default); border-radius: var(--radius);
  display: flex; align-items: center; gap: 6px; }
.shift-indicator.day { color: var(--neon-yellow); border-color: rgba(255,230,0,0.25); }
.shift-indicator.night { color: var(--col-awaiting); border-color: rgba(155,89,255,0.25); }

.spacer { flex: 1; }
.hud-badges { display: flex; gap: 6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; }
.hud-badges .b { padding: 3px 8px; border: 1px solid var(--border-default); border-radius: var(--radius);
  color: var(--text-secondary); display: flex; gap: 4px; align-items: center; white-space: nowrap; }
.hud-badges .b b { color: var(--text-primary); }
.hud-badges .b.flag b { color: var(--neon-yellow); }

.icon-btn { background: transparent; border: 1px solid var(--border-default); border-radius: var(--radius);
  color: var(--text-secondary); width: 32px; height: 32px; display: inline-flex; align-items: center;
  justify-content: center; font-size: 15px; transition: border-color .15s, color .15s; position: relative; }
.icon-btn:hover { border-color: var(--border-active); color: var(--text-primary); }
.badge-count { position: absolute; top: -6px; right: -6px; background: var(--neon-magenta); color: #fff;
  font-family: var(--font-mono); font-size: 9px; min-width: 15px; height: 15px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; padding: 0 3px; font-weight: 700; }

.user-pill { display: flex; align-items: center; gap: 8px; padding: 3px 10px 3px 4px;
  border: 1px solid var(--border-active); border-radius: 20px; background: var(--bg-glass);
  cursor: pointer; position: relative; }
.user-pill:hover { border-color: var(--border-glow); }
.user-pill .name { font-size: 13px; font-weight: 500; }

.avatar { border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 500; flex-shrink: 0; border: 1px solid; }

nav.tabs { display: flex; gap: 2px; }
nav.tabs button { background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--text-secondary); padding: 6px 12px; font-size: 13px; font-weight: 500; transition: color .15s; }
nav.tabs button:hover { color: var(--text-primary); }
nav.tabs button.active { color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); }
.sync-status { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.sync-status button { background: transparent; border: 1px solid var(--border-default); border-radius: var(--radius);
  color: var(--text-secondary); font-size: 10px; padding: 2px 6px; }
.offline-badge { display: none; font-family: var(--font-mono); font-size: 10px; padding: 2px 7px;
  border: 1px solid var(--neon-magenta); color: var(--neon-magenta); border-radius: var(--radius); }
body.offline .offline-badge { display: inline-block; }

/* Announcement banner */
.announce-banner { display: none; padding: 8px 16px; font-size: 13px; align-items: center; gap: 12px;
  border-left: 3px solid; flex-shrink: 0; }
.announce-banner.show { display: flex; }
.announce-banner.info { background: rgba(0,102,255,0.15); border-color: var(--col-inwork); }
.announce-banner.warning { background: rgba(255,136,0,0.15); border-color: var(--col-hold); }
.announce-banner.critical { background: rgba(255,0,110,0.15); border-color: var(--neon-magenta);
  animation: crit-border 1.5s ease-in-out infinite; }
@keyframes crit-border { 0%,100% { border-color: var(--neon-magenta); } 50% { border-color: rgba(255,0,110,0.3); } }
.announce-banner .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-left: auto; }
.announce-banner .clear-x { background: transparent; border: 1px solid var(--border-default); border-radius: var(--radius);
  color: var(--text-secondary); padding: 2px 8px; font-size: 11px; }

/* New-handoff banner */
.handoff-banner { display: none; padding: 10px 16px; background: rgba(0,245,255,0.1);
  border-bottom: 1px solid var(--border-active); align-items: center; gap: 12px; flex-shrink: 0; cursor: pointer; }
.handoff-banner.show { display: flex; }
.handoff-banner .ack-btn { margin-left: auto; background: var(--neon-cyan); color: #001016; border: none;
  border-radius: var(--radius); padding: 5px 14px; font-weight: 600; font-size: 12px; }

/* ============================================================================
   5. MAIN / VIEWS
   ========================================================================== */
main { flex: 1; overflow: hidden; position: relative; }
.view { display: none; height: 100%; overflow: auto; }
.view.active { display: block; }

/* Filter bar */
.filterbar { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px;
  border-bottom: 1px solid var(--border-default); background: rgba(5,8,16,0.4); flex-wrap: wrap; }
.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.chip { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border-default); border-radius: 14px;
  background: transparent; color: var(--text-secondary); transition: all .15s; white-space: nowrap; }
.chip:hover { border-color: var(--border-active); color: var(--text-primary); }
.chip.active { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: var(--glow-cyan-sm); }
.chip.preset.active { box-shadow: 0 0 10px rgba(0,245,255,0.5); }
.chip.preset .del { margin-left: 6px; opacity: 0; color: var(--neon-magenta); }
.chip.preset:hover .del { opacity: 1; }
.search-box { flex: 1; min-width: 200px; max-width: 340px; }
.search-box input { width: 100%; background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: var(--radius); padding: 6px 10px; font-size: 13px; }
.search-box input:focus { border-color: var(--border-active); outline: none; }
.filter-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em; margin-right: 2px; }
.divider-v { width: 1px; height: 18px; background: var(--border-default); }
.toggle-switch { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
.filter-count { font-family: var(--font-mono); font-size: 10px; background: var(--neon-cyan); color: #001016;
  padding: 1px 6px; border-radius: 8px; font-weight: 700; }
.btn { background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: var(--radius);
  color: var(--text-primary); padding: 5px 12px; font-size: 12px; font-weight: 500; transition: all .15s; }
.btn:hover { border-color: var(--border-active); }
.btn.primary { background: var(--neon-cyan); color: #001016; border-color: var(--neon-cyan); font-weight: 600; }
.btn.primary:hover { box-shadow: var(--glow-cyan-sm); }
.btn.danger { border-color: rgba(255,0,110,0.4); color: var(--neon-magenta); }
.btn.danger:hover { background: rgba(255,0,110,0.12); }
.btn.ghost { background: transparent; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.sm { padding: 3px 8px; font-size: 11px; }

/* Board */
.board { display: flex; gap: 12px; padding: 14px 16px; height: calc(100% - 92px);
  align-items: flex-start; min-width: max-content; }
.board.focus-mode { }
.column { background: rgba(10,14,26,0.4); border: 1px solid var(--border-default); border-radius: var(--radius);
  width: 280px; min-width: 280px; max-height: 100%; display: flex; flex-direction: column;
  border-left: 3px solid var(--col-color, var(--col-queue)); }
.column.drag-over { border-color: var(--border-active); box-shadow: var(--glow-cyan-sm); }
.column[data-col="in-work"] { --col-color: var(--col-inwork); }
.column[data-col="in-queue"] { --col-color: var(--col-queue); }
.column[data-col="hold"] { --col-color: var(--col-hold); }
.column[data-col="awaiting"] { --col-color: var(--col-awaiting); }
.column[data-col="complete"] { --col-color: var(--col-complete); }
.column[data-col="needs-planning"] { --col-color: var(--col-needs-planning); }
.col-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-default); }
.col-header .title { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--col-color, var(--text-secondary)); font-weight: 500; }
.col-header .count { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
.col-header .sort-toggle { margin-left: auto; font-size: 10px; background: transparent; border: 1px solid var(--border-default);
  border-radius: var(--radius); color: var(--text-muted); padding: 2px 6px; }
.col-header .sort-toggle.active { color: var(--neon-cyan); border-color: var(--border-active); }
.col-body { padding: 8px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
.col-empty { color: var(--text-muted); font-size: 12px; text-align: center; padding: 24px 8px; line-height: 1.6; }
.col-empty .hint { font-size: 11px; margin-top: 6px; color: var(--text-muted); }

/* Task card */
.task-card { background: var(--bg-glass); backdrop-filter: blur(12px); border: 1px solid var(--border-default);
  border-radius: var(--radius); box-shadow: var(--glow-card); padding: 10px; position: relative;
  transition: border-color .15s, box-shadow .15s; cursor: pointer; border-left: 2px solid transparent; }
.task-card:hover { border-color: var(--border-active); box-shadow: var(--glow-card), var(--glow-cyan-sm); }
.task-card.focused, .task-card[aria-selected="true"] { border-color: var(--border-glow);
  box-shadow: var(--glow-card), var(--glow-cyan-md); }
.task-card.selected { border-color: var(--neon-cyan); }
.task-card.flagged { border-left: 3px solid var(--neon-yellow); }
.task-card.request { border-style: dashed; }
.task-card.glitch { animation: glitch-in 0.2s steps(3) 1; }
@keyframes glitch-in {
  0% { transform: translateX(0); clip-path: inset(0); }
  20% { transform: translateX(-4px); clip-path: inset(10% 0 80% 0); }
  40% { transform: translateX(4px); clip-path: inset(80% 0 10% 0); }
  60% { transform: translateX(-2px); clip-path: inset(30% 0 60% 0); }
  80% { transform: translateX(2px); clip-path: inset(60% 0 30% 0); }
  100% { transform: translateX(0); clip-path: inset(0); }
}
/* Aging */
.task-card.age-2 { border-left-color: rgba(0,245,255,0.25); }
.task-card.age-3 { border-left-color: rgba(255,136,0,0.5); }
.task-card.age-4 { border-left-color: var(--neon-magenta); animation: age-pulse 3s ease-in-out infinite; }
@keyframes age-pulse { 0%,100% { border-left-color: var(--neon-magenta); } 50% { border-left-color: rgba(255,0,110,0.4); } }

.card-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
.card-drag { cursor: grab; color: var(--text-muted); opacity: 0; font-size: 12px; line-height: 1; padding-top: 2px; }
.task-card:hover .card-drag { opacity: 1; }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.priority-low { background: #4a4f6a; }
.priority-normal { background: #0066ff; }
.priority-high { background: #ff8800; }
.priority-critical { background: #ff006e; box-shadow: var(--glow-magenta); animation: critical-pulse 2s ease-in-out infinite; }
@keyframes critical-pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 6px rgba(255,0,110,0.8); }
  50% { opacity: 0.7; box-shadow: 0 0 2px rgba(255,0,110,0.3); }
}
/* Spelled-out priority label (replaces the bare dot on cards) */
.prio-label { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
.prio-label::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.prio-label.p-low { color: #8088a8; }
.prio-label.p-normal { color: #4d8bff; }
.prio-label.p-high { color: #ff8800; }
.prio-label.p-critical { color: #ff006e; text-shadow: 0 0 6px rgba(255,0,110,0.5); }
.prio-label.p-critical::before { box-shadow: var(--glow-magenta); animation: critical-pulse 2s ease-in-out infinite; }
.card-title { font-size: 14px; font-weight: 500; flex: 1; word-break: break-word; line-height: 1.35; }
.card-title[contenteditable="true"] { outline: none; border-bottom: 1px solid var(--neon-cyan); }
.req-badge { font-family: var(--font-mono); font-size: 8px; color: var(--col-awaiting); border: 1px solid rgba(155,89,255,0.4);
  padding: 1px 3px; border-radius: 2px; letter-spacing: 0.1em; }
.card-flag { position: absolute; top: 6px; right: 6px; background: transparent; border: none; color: var(--text-muted);
  opacity: 0; font-size: 13px; transition: opacity .15s; }
.task-card:hover .card-flag, .task-card.flagged .card-flag { opacity: 1; }
.task-card.flagged .card-flag { color: var(--neon-yellow); }
.card-menu-btn { position: absolute; top: 6px; right: 26px; background: transparent; border: none;
  color: var(--text-muted); opacity: 0; font-size: 14px; line-height: 1; }
.task-card:hover .card-menu-btn { opacity: 1; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.card-tag { font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); background: rgba(255,255,255,0.04);
  padding: 1px 5px; border-radius: 2px; letter-spacing: 0.05em; }
/* Card body rows — clear separation between priority/owner, fields, tags, footer */
.card-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.card-line .card-assignee { margin-left: auto; }
.card-fields { display: flex; flex-wrap: wrap; gap: 2px 14px; margin-top: 7px;
  padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.04); }
.card-cf { font-family: var(--font-mono); font-size: 10px; }
.card-cf .cf-k { color: var(--text-muted); }
.card-cf .cf-v { color: var(--text-primary); }
.card-tags-row { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-top: 7px; }
.card-foot { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.card-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-left: auto; }
.hold-reason { font-size: 11px; color: var(--col-hold); background: rgba(255,136,0,0.08);
  border-radius: 2px; padding: 3px 6px; margin-top: 6px; font-style: italic; }
.awaiting-reason { color: var(--col-awaiting); background: rgba(155,89,255,0.08); }
.dep-tag { font-size: 9px; font-family: var(--font-mono); color: var(--col-hold); margin-top: 4px; display: block; }
.dep-tag.blocking { color: var(--neon-cyan); }
.dep-tag.resolved { color: var(--neon-green); }
.assignee-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; }
.assignee-chip.unassigned { color: var(--text-muted); }
.assignee-chip.needs-owner { color: var(--neon-yellow); }
.card-badges { display: flex; gap: 4px; align-items: center; }
.mini-badge { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); display: inline-flex; gap: 2px; align-items: center; }
.mini-badge.stale { color: var(--neon-yellow); }
.mini-badge.aging { color: var(--col-hold); }
.mini-badge.aging.mag { color: var(--neon-magenta); }
.mini-badge.recurring { color: var(--col-awaiting); }
.timer-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-cyan); animation: critical-pulse 1.5s infinite; }
.drop-placeholder { height: 2px; background: var(--neon-cyan); box-shadow: var(--glow-cyan-sm); margin: 2px 0; border-radius: 2px; }

/* Bulk action bar */
.bulk-bar { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 200;
  background: var(--bg-elevated); border: 1px solid var(--border-active); border-radius: var(--radius);
  box-shadow: var(--glow-cyan-md); padding: 10px 16px; display: none; align-items: center; gap: 10px; }
.bulk-bar.show { display: flex; }
.bulk-bar .count { font-family: var(--font-mono); color: var(--neon-cyan); font-size: 13px; }

/* ============================================================================
   6. MODALS / OVERLAYS
   ========================================================================== */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
  z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.overlay.show { display: flex; }
.modal { background: var(--bg-elevated); border: 1px solid var(--border-active); border-radius: var(--radius);
  box-shadow: var(--glow-cyan-md); max-width: 560px; width: 100%; max-height: 88vh; overflow: auto;
  animation: modal-in 0.15s ease-out; }
.modal.wide { max-width: 820px; }
@keyframes modal-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border-default); display: flex; align-items: center; gap: 10px; }
.modal-head h2 { margin: 0; font-size: 16px; font-weight: 600; }
.modal-head .close { margin-left: auto; background: transparent; border: none; color: var(--text-secondary); font-size: 18px; }
.modal-body { padding: 18px; }
.modal-foot { padding: 14px 18px; border-top: 1px solid var(--border-default); display: flex; gap: 8px; justify-content: flex-end; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 5px; }
.field input[type=text], .field input[type=number], .field input[type=password], .field select, .field textarea {
  width: 100%; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius);
  padding: 8px 10px; font-size: 13px; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--border-active); outline: none; }
.field textarea { resize: vertical; min-height: 60px; }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }
.seg { display: inline-flex; border: 1px solid var(--border-default); border-radius: var(--radius); overflow: hidden; }
.seg button { background: transparent; border: none; padding: 6px 14px; font-size: 12px; color: var(--text-secondary); }
.seg button.active { background: var(--neon-cyan); color: #001016; font-weight: 600; }

/* Identity selector */
.identity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.identity-card { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius);
  padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all .15s; }
.identity-card:hover { border-color: var(--border-active); box-shadow: var(--glow-cyan-sm); transform: translateY(-2px); }
.identity-card .nm { font-size: 15px; font-weight: 500; }
.identity-card .sh { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

/* Quick-add popover */
.quick-add { position: fixed; z-index: 1100; background: var(--bg-elevated); border: 1px solid var(--border-active);
  border-radius: var(--radius); box-shadow: var(--glow-cyan-md); padding: 10px; width: 320px; display: none; }
.quick-add.show { display: block; }
.quick-add input { width: 100%; background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: var(--radius); padding: 8px; font-size: 13px; margin-bottom: 8px; }
.quick-add .qa-row { display: flex; gap: 8px; }
.quick-add select { flex: 1; background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: var(--radius); padding: 6px; font-size: 12px; }

/* Context menu */
.ctx-menu { position: fixed; z-index: 1200; background: var(--bg-elevated); border: 1px solid var(--border-active);
  border-radius: var(--radius); box-shadow: var(--glow-cyan-md); padding: 4px; min-width: 200px; display: none; }
.ctx-menu.show { display: block; }
.ctx-item { padding: 7px 12px; font-size: 13px; border-radius: 2px; display: flex; align-items: center; gap: 8px;
  position: relative; white-space: nowrap; }
.ctx-item:hover { background: rgba(0,245,255,0.08); }
.ctx-item.danger { color: var(--neon-magenta); }
.ctx-item .sub-arrow { margin-left: auto; color: var(--text-muted); }
.ctx-sub { position: absolute; left: 100%; top: 0; background: var(--bg-elevated); border: 1px solid var(--border-active);
  border-radius: var(--radius); padding: 4px; min-width: 160px; display: none; box-shadow: var(--glow-cyan-md); }
.ctx-item:hover > .ctx-sub { display: block; }
.ctx-divider { height: 1px; background: var(--border-default); margin: 4px 0; }

/* Toasts */
.toast-wrap { position: fixed; bottom: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg-glass); backdrop-filter: blur(12px); border-left: 3px solid var(--neon-cyan);
  border-radius: var(--radius); padding: 10px 14px; font-size: 13px; min-width: 240px; max-width: 360px;
  box-shadow: var(--glow-card); animation: toast-in 0.2s ease-out; display: flex; align-items: center; gap: 8px; }
.toast.success { border-left-color: var(--neon-green); }
.toast.warning { border-left-color: var(--neon-yellow); }
.toast.error { border-left-color: var(--neon-magenta); box-shadow: var(--glow-card), var(--glow-magenta); }
.toast .toast-action { margin-left: auto; color: var(--neon-cyan); font-size: 12px; background: none; border: none; }
@keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

/* Notifications dropdown */
.dropdown { position: absolute; top: 100%; right: 0; margin-top: 6px; z-index: 1300; width: 320px;
  background: var(--bg-elevated); border: 1px solid var(--border-active); border-radius: var(--radius);
  box-shadow: var(--glow-cyan-md); display: none; max-height: 420px; overflow: auto; }
.dropdown.show { display: block; }
.dropdown-head { padding: 10px 12px; display: flex; align-items: center; border-bottom: 1px solid var(--border-default); }
.dropdown-head h3 { margin: 0; font-size: 13px; }
.notif-item { padding: 10px 12px; border-bottom: 1px solid var(--border-default); font-size: 12px; cursor: pointer; }
.notif-item:hover { background: rgba(0,245,255,0.05); }
.notif-item.unread { border-left: 2px solid var(--neon-cyan); }
.notif-item .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* Generic list views (daily log, stats, settings, weekly, handoff) */
.view-wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
.view-wrap h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
.view-wrap .sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 18px; }
.panel { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius);
  padding: 16px; margin-bottom: 16px; }
.panel h2 { font-size: 14px; margin: 0 0 12px; font-family: var(--font-mono); letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-secondary); }

/* Daily log */
.log-line { font-family: var(--font-mono); font-size: 12px; padding: 5px 0; display: flex; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03); align-items: baseline; }
.log-line .lt { color: var(--neon-cyan); width: 48px; flex-shrink: 0; }
.log-line .la { color: var(--text-secondary); width: 90px; flex-shrink: 0; }
.log-line .ld { color: var(--text-primary); flex: 1; }
.log-line .snap-btn { font-size: 10px; opacity: 0; }
.log-line:hover .snap-btn { opacity: 1; }

/* Stats SVG */
.stat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.stat-bar-row .lbl { width: 120px; font-size: 12px; }
.stat-bar-row svg { flex: 1; }
.stat-num { font-family: var(--font-mono); font-size: 28px; color: var(--neon-cyan); }
.metric-row { display: flex; gap: 24px; }
.metric { text-align: center; }
.metric .v { font-family: var(--font-mono); font-size: 24px; }
.metric .k { font-size: 11px; color: var(--text-secondary); }

/* Tabs (settings/weekly) */
.subtabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border-default); margin-bottom: 16px; flex-wrap: wrap; }
.subtabs button { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 8px 14px;
  font-size: 13px; color: var(--text-secondary); }
.subtabs button.active { color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); }

/* Storage meter */
.meter { height: 8px; background: var(--bg-void); border-radius: 4px; overflow: hidden; margin: 6px 0; }
.meter .fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--col-inwork)); }
.meter .fill.warn { background: var(--neon-yellow); }
.meter .fill.crit { background: var(--neon-magenta); }

/* Task detail panel */
.detail-panel { position: fixed; top: 0; right: 0; height: 100vh; width: 46%; min-width: 480px; max-width: 720px;
  background: var(--bg-surface); border-left: 1px solid var(--border-active); box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  z-index: 900; transform: translateX(100%); transition: transform 0.2s ease-out; overflow: auto; display: flex; flex-direction: column; }
.detail-panel.open { transform: translateX(0); }
body.split-mode .detail-panel.open { box-shadow: none; }
body.split-mode.detail-open main { width: 58%; }
.detail-head { padding: 14px 16px; border-bottom: 1px solid var(--border-default); display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; background: var(--bg-surface); z-index: 5; }
.detail-body { padding: 16px; }
.detail-section { margin-bottom: 18px; }
.detail-section > h3 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-secondary); margin: 0 0 8px; }

/* Rich text editor */
.editor-toolbar { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px; background: var(--bg-elevated);
  border: 1px solid var(--border-default); border-bottom: none; border-radius: var(--radius) var(--radius) 0 0;
  position: sticky; top: 52px; z-index: 4; }
.tb-btn { background: transparent; border: 1px solid transparent; border-radius: 2px; color: var(--text-secondary);
  width: 28px; height: 26px; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }
.tb-btn:hover { background: rgba(0,245,255,0.08); color: var(--text-primary); }
.tb-btn.active { background: rgba(0,245,255,0.15); color: var(--neon-cyan); border-color: var(--border-active); }
.tb-divider { width: 1px; background: var(--border-default); margin: 2px 4px; }
.tb-dd { position: relative; }
.tb-menu { position: absolute; top: 100%; left: 0; background: var(--bg-elevated); border: 1px solid var(--border-active);
  border-radius: var(--radius); padding: 6px; z-index: 10; display: none; box-shadow: var(--glow-cyan-md); }
.tb-menu.show { display: block; }
.color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.color-swatch { width: 22px; height: 22px; border-radius: 2px; border: 1px solid var(--border-default); cursor: pointer; }
.grid-picker { display: grid; grid-template-columns: repeat(6, 16px); gap: 2px; }
.grid-picker .gp-cell { width: 16px; height: 16px; border: 1px solid var(--border-default); }
.grid-picker .gp-cell.on { background: var(--neon-cyan); border-color: var(--neon-cyan); }
.editor { min-height: 140px; background: var(--bg-void); border: 1px solid var(--border-default); border-radius: 0 0 var(--radius) var(--radius);
  padding: 12px; font-size: 14px; line-height: 1.6; outline: none; overflow: auto; }
.editor:focus { border-color: var(--border-active); }
.editor h1 { font-size: 22px; margin: 8px 0; } .editor h2 { font-size: 18px; margin: 8px 0; } .editor h3 { font-size: 15px; margin: 6px 0; }
.editor code { font-family: var(--font-mono); background: rgba(0,245,255,0.1); padding: 1px 4px; border-radius: 2px; font-size: 12px; }
.editor pre { font-family: var(--font-mono); background: #1a1d22; border: 1px solid var(--border-default); border-radius: var(--radius);
  padding: 10px; overflow: auto; font-size: 12px; position: relative; }
.editor table { border-collapse: collapse; margin: 8px 0; }
.editor table td, .editor table th { border: 1px solid var(--border-default); padding: 4px 8px; min-width: 50px; }
.editor table th { background: rgba(0,245,255,0.06); font-weight: 600; }
.editor ul, .editor ol { padding-left: 22px; }
.editor .checklist-item { list-style: none; display: flex; gap: 6px; align-items: flex-start; }
.editor .checklist-item input { margin-top: 4px; }
.editor .checklist-item.checked > span { text-decoration: line-through; color: var(--text-muted); }
.editor details { border-left: 2px solid var(--border-active); padding-left: 10px; margin: 6px 0; }
.editor summary { cursor: pointer; font-weight: 500; }
.editor .mention { background: rgba(0,245,255,0.12); color: var(--neon-cyan); padding: 1px 5px; border-radius: 3px;
  font-size: 13px; white-space: nowrap; }
.editor img { max-width: 100%; border-radius: 2px; }
.editor-status { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; padding: 6px 0; }
.editor-status .dirty { color: var(--neon-yellow); }
.mention-pop { position: fixed; z-index: 1400; background: var(--bg-elevated); border: 1px solid var(--border-active);
  border-radius: var(--radius); box-shadow: var(--glow-cyan-md); padding: 4px; min-width: 160px; display: none; }
.mention-pop.show { display: block; }
.mention-pop .mp-item { padding: 6px 10px; font-size: 13px; border-radius: 2px; display: flex; gap: 8px; align-items: center; }
.mention-pop .mp-item.sel { background: rgba(0,245,255,0.12); }

/* Version history */
.version-entry { font-family: var(--font-mono); font-size: 11px; padding: 5px 8px; border-bottom: 1px solid var(--border-default);
  color: var(--text-secondary); cursor: pointer; }
.version-entry:hover { background: rgba(0,245,255,0.05); }
.version-diff { background: var(--bg-void); padding: 8px; border-radius: var(--radius); font-size: 12px; margin-top: 4px; }
.diff-add { background: rgba(0,255,148,0.15); color: var(--neon-green); }
.diff-del { background: rgba(255,0,110,0.15); color: var(--neon-magenta); text-decoration: line-through; }

/* Attachments */
.dropzone { border: 1px dashed var(--border-active); border-radius: var(--radius); padding: 16px; text-align: center;
  color: var(--text-secondary); font-size: 12px; margin-top: 8px; }
.dropzone.drag-over { background: rgba(0,245,255,0.06); border-color: var(--neon-cyan); }
.attach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin-top: 8px; }
.attach-item { background: var(--bg-void); border: 1px solid var(--border-default); border-radius: var(--radius); padding: 6px; font-size: 10px; }
.attach-item img { width: 100%; height: 70px; object-fit: cover; border-radius: 2px; cursor: pointer; }
.attach-item .icon { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.attach-item .fn { font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }

/* Comments */
.comment { display: flex; gap: 8px; margin-bottom: 10px; }
.comment .body { flex: 1; }
.comment .ch { font-size: 11px; color: var(--text-secondary); }
.comment .ch b { color: var(--text-primary); }
.comment .ct { font-size: 13px; white-space: pre-wrap; word-break: break-word; }
.comment .del-c { font-size: 10px; opacity: 0; }
.comment:hover .del-c { opacity: 0.6; }

/* Lightbox */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; display: none;
  align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 90vw; max-height: 80vh; }

/* Command palette */
.cmd-palette { background: var(--bg-elevated); border: 1px solid var(--border-glow); border-radius: var(--radius);
  box-shadow: var(--glow-cyan-md); width: 100%; max-width: 560px; overflow: hidden; }
.cmd-palette input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-glow);
  padding: 14px 16px; font-family: var(--font-mono); font-size: 15px; caret-color: var(--neon-cyan); }
.cmd-palette input:focus { outline: none; }
.cmd-results { max-height: 360px; overflow: auto; }
.cmd-item { padding: 10px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; border-left: 2px solid transparent; }
.cmd-item.sel { background: rgba(0,245,255,0.08); border-left-color: var(--neon-cyan); }
.cmd-item .kbd { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
  border: 1px solid var(--border-default); padding: 1px 5px; border-radius: 2px; }
.cmd-item .cat { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

/* Snapshot overlay */
.snapshot-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 950; background: var(--neon-magenta);
  color: #fff; text-align: center; padding: 8px; font-family: var(--font-mono); font-size: 12px; display: none; }
.snapshot-banner.show { display: block; }

/* Keyboard shortcuts modal table */
.kbd-table { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; font-size: 13px; }
.kbd-table .k { font-family: var(--font-mono); color: var(--neon-cyan); }

/* Helpers */
.row { display: flex; align-items: center; gap: 8px; }
.muted { color: var(--text-muted); }
.sec { color: var(--text-secondary); }
.right { margin-left: auto; }
.hidden { display: none !important; }
.mt8 { margin-top: 8px; } .mt12 { margin-top: 12px; } .mb8 { margin-bottom: 8px; }
.small { font-size: 12px; } .tiny { font-size: 11px; }
.tag-pill { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border: 1px solid var(--border-default);
  border-radius: 10px; color: var(--text-secondary); }
.status-badge { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 0; }

/* Print */
@media print {
  body { overflow: visible; background: #fff; color: #000; }
  #bg-canvas, #starfield, .bg-grid, .bg-scanline, header.hud, .filterbar, .detail-panel, .toast-wrap,
  .bulk-bar, nav.tabs, .icon-btn { display: none !important; }
  .print-only { display: block !important; }
  .print-section { page-break-after: always; }
}
.print-only { display: none; }

<script>
"use strict";
/* ============================================================================
   SPECIALIST TURNOVER — application script (all inline, vanilla JS)
   ========================================================================== */

/* ---- 0. Constants ---- */
const CURRENT_SCHEMA_VERSION = 1;
const LS_KEY = 'specialist-turnover-state';
const COLUMNS = [
  { id: 'in-work',  label: 'In Work' },
  { id: 'in-queue', label: 'In Queue' },
  { id: 'hold',     label: 'On Hold' },
  { id: 'awaiting', label: 'Awaiting' },
  { id: 'complete', label: 'Complete' },
  { id: 'needs-planning', label: 'Needs Planning' },
];
const COL_LABEL = Object.fromEntries(COLUMNS.map(c => [c.id, c.label]));
const PRIORITIES = ['low', 'normal', 'high', 'critical'];
const AVATAR_COLORS = {
  'Ryan':     { bg: 'rgba(0,102,255,0.25)', border: '#0066ff', text: '#6699ff' },
  'Grayson':  { bg: 'rgba(0,255,148,0.2)',  border: '#00ff94', text: '#00ff94' },
  'Justin':   { bg: 'rgba(255,136,0,0.2)',  border: '#ff8800', text: '#ffaa44' },
  'Terrence': { bg: 'rgba(155,89,255,0.2)', border: '#9b59ff', text: '#bb88ff' },
};
const SYSTEM_OPTIONS = ['LOX','LN2','RP-1','Hydraulic','Electrical','GSE','Other'];

/* ---- 1. Tiny utilities ---- */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const uuid = () => (crypto.randomUUID ? crypto.randomUUID() :
  'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); }));
const nowISO = () => new Date().toISOString();
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, m =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const clamp = (n,a,b) => Math.max(a, Math.min(b, n));
const lerp = (a,b,t) => a + (b-a)*t;

function fmtTime(d) { // HH:MM 24h for logs
  d = new Date(d); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtClock(d) { // 12h with seconds
  let h = d.getHours(); const ap = h>=12?'PM':'AM'; h = h%12||12;
  return `${h}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} ${ap}`;
}
function fmtDateKey(d){ d=new Date(d); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateTime(d){ d=new Date(d); return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtDuration(ms) {
  const mins = Math.floor(ms/60000);
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins/60), rem = mins%60;
  if (hrs < 48) return hrs + 'h' + (rem? ' '+rem+'m':'');
  const days = Math.floor(hrs/24), rh = hrs%24;
  return days + 'd' + (rh? ' '+rh+'h':'');
}
function relTime(d) {
  const diff = Date.now() - new Date(d).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'just now'; if (m < 60) return m+'m ago';
  const h = Math.floor(m/60); if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
/* Fuzzy subsequence match — returns true if all chars of needle appear in order */
function fuzzy(needle, hay) {
  needle = (needle||'').toLowerCase(); hay = (hay||'').toLowerCase();
  if (!needle) return true;
  let i = 0; for (const ch of hay) { if (ch === needle[i]) i++; if (i === needle.length) return true; }
  return false;
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); }; }

/* ---- 2. IndexedDB wrapper (binary data: attachments, embedded imgs, note versions) ---- */
const DB = (() => {
  let dbp = null;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((resolve, reject) => {
      if (!('indexedDB' in window)) { reject(new Error('no-idb')); return; }
      const req = indexedDB.open('specialist-turnover', 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        ['attachments','note-versions','embedded-imgs'].forEach(s => {
          if (!db.objectStoreNames.contains(s)) db.createObjectStore(s);
        });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbp;
  }
  async function put(store, key, value) {
    try { const db = await open(); return await new Promise((res, rej) => {
      const tx = db.transaction(store,'readwrite'); tx.objectStore(store).put(value, key);
      tx.oncomplete = () => res(true); tx.onerror = () => rej(tx.error);
    }); } catch(e){ /* fallback */ try{ localStorage.setItem('idbfb:'+store+':'+key, JSON.stringify(value)); }catch(_){} }
  }
  async function get(store, key) {
    try { const db = await open(); return await new Promise((res, rej) => {
      const tx = db.transaction(store,'readonly'); const r = tx.objectStore(store).get(key);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    }); } catch(e){ try{ const v = localStorage.getItem('idbfb:'+store+':'+key); return v?JSON.parse(v):undefined; }catch(_){ return undefined; } }
  }
  async function del(store, key) {
    try { const db = await open(); return await new Promise((res) => {
      const tx = db.transaction(store,'readwrite'); tx.objectStore(store).delete(key);
      tx.oncomplete = () => res(true); tx.onerror = () => res(false);
    }); } catch(e){ localStorage.removeItem('idbfb:'+store+':'+key); }
  }
  async function keys(store) {
    try { const db = await open(); return await new Promise((res) => {
      const tx = db.transaction(store,'readonly'); const r = tx.objectStore(store).getAllKeys();
      r.onsuccess = () => res(r.result||[]); r.onerror = () => res([]);
    }); } catch(e){ return []; }
  }
  return { put, get, del, keys, open };
})();

/* ---- 3. Default state & seed data ---- */
function defaultSettings() {
  return {
    team: { day: ['Ryan','Grayson'], night: ['Justin','Terrence'] },
    shiftStartDay: '06:00', shiftStartNight: '18:00',
    anthropicApiKey: null, theme: 'system', accent: 'cyan', activeUserId: null,
  };
}
function defaultCustomFields() {
  return [
    { id: 'wo', name: 'WO Number', type: 'text', options: null, required: false, showOnCard: true, order: 0 },
    { id: 'system', name: 'System', type: 'dropdown', options: SYSTEM_OPTIONS, required: false, showOnCard: true, order: 1 },
  ];
}
function defaultAutomationRules() {
  return [
    { id: 'stale-detection', enabled: true, thresholdDays: 3, thresholdHours: null, targetColumn: null },
    { id: 'auto-escalate', enabled: true, thresholdDays: null, thresholdHours: null, targetColumn: null,
      escalations: [ { column: 'in-work', hours: 8 }, { column: 'hold', hours: 48 } ] },
    { id: 'auto-archive', enabled: true, thresholdDays: 7, thresholdHours: null, targetColumn: 'complete' },
  ];
}
function defaultTemplates() {
  return [
    { id: uuid(), name: 'Pre-Op Checklist', title: 'Pre-Op Checklist', status: 'in-queue', priority: 'high',
      assignee: null, tags: ['pre-op'], customFields: {}, noteContent: '<p>Pre-operation verification.</p>', recurring: null, createdAt: nowISO() },
    { id: uuid(), name: 'End of Shift Walkdown', title: 'End of Shift Walkdown', status: 'in-queue', priority: 'normal',
      assignee: null, tags: ['walkdown'], customFields: {}, noteContent: '<p>End of shift walkdown.</p>', recurring: null, createdAt: nowISO() },
    { id: uuid(), name: 'Hardware Install', title: 'Hardware Install', status: 'in-work', priority: 'normal',
      assignee: null, tags: ['install'], customFields: { wo: '' }, noteContent: '<p>Hardware installation steps.</p>', recurring: null, createdAt: nowISO() },
  ];
}
const BUILTIN_CHECKLISTS = [
  { id: 'preop', name: 'Pre-Op Safety Checklist', items: ['Area cleared of non-essential personnel','PPE verified','Lockout/tagout confirmed','Comms check complete','Emergency stops verified'] },
  { id: 'eos', name: 'End of Shift Walkdown', items: ['All tools accounted for','Panels secured','Open work orders logged','Hazards flagged','Area clean'] },
  { id: 'hwinstall', name: 'Hardware Install Steps', items: ['Verify part number','Inspect for damage','Torque to spec','Continuity check','Document WO'] },
  { id: 'fluid', name: 'Fluid System Integrity Check', items: ['Visual leak inspection','Pressure verify','Valve positions confirmed','Sensor readback nominal'] },
];

function getDefaultState() {
  const s = {
    schemaVersion: CURRENT_SCHEMA_VERSION,
    tasks: [], handoffs: [], activityFeed: [], notifications: [], templates: defaultTemplates(),
    customFieldDefs: defaultCustomFields(), announcements: [], automationRules: defaultAutomationRules(),
    checklistBlocks: BUILTIN_CHECKLISTS.map(c => ({...c})),
    savedFilterPresets: [], rulesLog: [], shiftNotes: {},
    settings: defaultSettings(), lastSyncedAt: nowISO(),
  };
  seedDemo(s);
  return s;
}

function seedDemo(s) {
  const now = Date.now();
  const mk = (o) => {
    const created = o.createdAt || new Date(now - (o.ageH||2)*3600000).toISOString();
    return Object.assign({
      id: uuid(), title: '', status: 'in-queue', assignee: null, priority: 'normal', holdReason: null,
      flagged: false, tags: [], customFields: {}, dependencies: [], blockedBy: [], notes: [], attachments: [],
      embeddedImageBytes: 0, columnHistory: [{ column: o.status||'in-queue', enteredAt: created, exitedAt: null, movedBy: o.createdBy||'Ryan' }],
      type: 'task', templateId: null, isRecurring: false, comments: [], estimatedHours: null, actualSessions: [],
      shift: 'day', createdBy: 'Ryan', createdAt: created, updatedAt: created, lastActivityAt: created,
      completedAt: null, archived: false, columnOrder: 0, timer: null,
    }, o);
  };
  s.tasks = [
    mk({ title: 'Crown DAQ Stack C fuse replacement', status: 'in-work', assignee: 'Ryan', priority: 'high',
      ageH: 3, tags: ['DAQ','crown'], customFields: { wo: 'WO-44821', system: 'Electrical' },
      notes: [{ id: uuid(), content: '<p>Replacing blown fuse on <strong>Stack C</strong>. Verified with multimeter.</p>', author: 'Ryan', timestamp: nowISO(), versions: [] }] }),
    mk({ title: 'PT-LOX-4082 noise investigation', status: 'in-work', assignee: 'Grayson', priority: 'normal',
      ageH: 5, tags: ['LOX','sensor'], customFields: { wo: 'WO-44830', system: 'LOX' } }),
    mk({ title: 'AKD Drive E01F1 fault', status: 'hold', assignee: 'Ryan', priority: 'critical', flagged: true,
      ageH: 28, holdReason: 'K42 relay ETA tomorrow 0700 per parts cage', tags: ['AKD','drive'], customFields: { system: 'Electrical' } }),
    mk({ title: 'Vaisala cable follow-up at mast base', status: 'in-queue', type: 'request', assignee: null, priority: 'normal',
      ageH: 1, tags: ['weather'], requestedBy: 'Grayson' }),
    mk({ title: 'GN2 panel regulator creep check', status: 'awaiting', assignee: 'Justin', priority: 'normal',
      ageH: 80, holdReason: 'Awaiting vendor callback on reg spec', tags: ['GN2'], customFields: { system: 'GSE' } }),
    mk({ title: 'Stray voltage survey — Pad B deck', status: 'in-queue', assignee: 'Terrence', priority: 'low', ageH: 6, tags: ['survey'] }),
    mk({ title: 'Replace GOX vent solenoid', status: 'complete', assignee: 'Grayson', priority: 'normal',
      ageH: 10, completedAt: new Date(now-9*3600000).toISOString(), tags: ['GOX'], customFields: { wo: 'WO-44801', system: 'GSE' } }),
  ];
  // seed a handoff + activity
  s.tasks.forEach(t => {
    s.activityFeed.push({ id: uuid(), taskId: t.id, taskTitle: t.title, type: 'created',
      actor: t.createdBy, detail: null, timestamp: t.createdAt });
  });
  s.activityFeed.sort((a,b)=> new Date(a.timestamp)-new Date(b.timestamp));
}

/* ---- 4. Migration runner (runs before any other app logic) ---- */
const MIGRATIONS = {
  // 2: (state) => { state.tasks.forEach(t => { t.type ??= 'task'; }); return state; },
};
function loadAndMigrate() {
  let raw;
  try { raw = localStorage.getItem(LS_KEY); } catch(e){ raw = null; }
  let state = null;
  try { state = raw ? JSON.parse(raw) : null; } catch(e){ state = null; }
  if (!state) return getDefaultState();
  try {
    let v = state.schemaVersion ?? 1;
    while (v < CURRENT_SCHEMA_VERSION) { v++; state = MIGRATIONS[v](state); state.schemaVersion = v; }
    // backfill any new top-level keys gracefully
    const d = getDefaultStateShell();
    for (const k in d) if (!(k in state)) state[k] = d[k];
    state.settings = Object.assign(defaultSettings(), state.settings || {});
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    return state;
  } catch (e) {
    console.error('Migration failed', e);
    if (confirm('Data migration failed — reset app? (Cancel to keep raw data and attempt import)')) {
      return getDefaultState();
    }
    return state || getDefaultState();
  }
}
function getDefaultStateShell() {
  return { schemaVersion: CURRENT_SCHEMA_VERSION, tasks: [], handoffs: [], activityFeed: [], notifications: [],
    templates: [], customFieldDefs: defaultCustomFields(), announcements: [], automationRules: defaultAutomationRules(),
    checklistBlocks: BUILTIN_CHECKLISTS.map(c=>({...c})), savedFilterPresets: [], rulesLog: [], shiftNotes: {},
    settings: defaultSettings(), lastSyncedAt: nowISO() };
}

/* ---- 5. App State container ---- */
let State = loadAndMigrate();
const TAB_ID = (() => { let t = sessionStorage.getItem('tabId'); if (!t){ t = uuid(); sessionStorage.setItem('tabId', t); } return t; })();
let activeUser = null;
let bc = null; // BroadcastChannel

const saveState = debounce(() => {
  try { State.lastSyncedAt = nowISO(); localStorage.setItem(LS_KEY, JSON.stringify(State)); }
  catch(e){ toast('Storage full — clear old data in Settings', 'error'); }
  updateSyncLabel();
}, 120);
function saveNow(){ try { localStorage.setItem(LS_KEY, JSON.stringify(State)); } catch(e){} }

/* ---- 6. Toast notifications ---- */
function toast(msg, type='info', action) {
  const wrap = $('#toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span>${esc(msg)}</span>`;
  if (action) {
    const b = document.createElement('button'); b.className = 'toast-action'; b.textContent = action.label;
    b.onclick = () => { action.fn(); el.remove(); }; el.appendChild(b);
  }
  wrap.appendChild(el);
  while (wrap.children.length > 3) wrap.firstChild.remove();
  setTimeout(() => { el.style.opacity = '0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(), 300); }, action?5000:3000);
}

/* ---- 7. Avatar rendering ---- */
function avatarHTML(name, size=20) {
  if (!name) return `<span class="avatar" style="width:${size}px;height:${size}px;font-size:${size*0.42}px;border-color:var(--text-muted);color:var(--text-muted)">?</span>`;
  const c = AVATAR_COLORS[name] || { bg:'rgba(122,128,153,0.2)', border:'#7a8099', text:'#7a8099' };
  const initials = name.slice(0,2).toUpperCase();
  return `<span class="avatar" title="${esc(name)}" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.42)}px;background:${c.bg};border-color:${c.border};color:${c.text}">${initials}</span>`;
}

/* ---- 8. Shift logic ---- */
function parseHM(str){ const [h,m] = (str||'0:0').split(':').map(Number); return h*60+(m||0); }
function currentShift() {
  const mins = new Date().getHours()*60 + new Date().getMinutes();
  const dayStart = parseHM(State.settings.shiftStartDay);
  const nightStart = parseHM(State.settings.shiftStartNight);
  // day shift = [dayStart, nightStart), night = rest
  if (dayStart < nightStart) return (mins >= dayStart && mins < nightStart) ? 'day' : 'night';
  return (mins >= dayStart || mins < nightStart) ? 'day' : 'night';
}
function shiftMembers(shift){ return State.settings.team[shift] || []; }
function nextHandoffTime() {
  const now = new Date();
  const mins = now.getHours()*60 + now.getMinutes();
  const dayStart = parseHM(State.settings.shiftStartDay);
  const nightStart = parseHM(State.settings.shiftStartNight);
  const targets = [dayStart, nightStart].sort((a,b)=>a-b);
  let next = null;
  for (const t of targets) if (t > mins) { next = t; break; }
  const d = new Date(now);
  if (next == null) { next = targets[0]; d.setDate(d.getDate()+1); }
  d.setHours(Math.floor(next/60), next%60, 0, 0);
  return d;
}

/* ---- 9. Activity feed + notifications helpers ---- */
function logActivity(type, task, detail, actor) {
  State.activityFeed.push({ id: uuid(), taskId: task?task.id:null, taskTitle: task?task.title:null,
    type, actor: actor || (activeUser||'System'), detail: detail||null, timestamp: nowISO() });
  // 90-day trim
  const cutoff = Date.now() - 90*86400000;
  State.activityFeed = State.activityFeed.filter(e => new Date(e.timestamp).getTime() > cutoff);
}
function pushNotification(type, message, taskId) {
  State.notifications.unshift({ id: uuid(), type, message, taskId: taskId||null, read: false, createdAt: nowISO() });
  State.notifications = State.notifications.slice(0, 50);
  renderBell();
}
function notify(type, message, taskId, forUser) {
  // only push if relevant to active user when forUser specified (best-effort, single-machine)
  pushNotification(type, message, taskId);
}

/* ---- 10. BroadcastChannel multi-tab sync (§31) ---- */
function initBroadcast() {
  if (!('BroadcastChannel' in window)) return;
  bc = new BroadcastChannel('specialist-turnover-sync');
  bc.onmessage = (ev) => {
    const m = ev.data; if (!m || m.tabId === TAB_ID) return;
    if (m.type === 'state-update') {
      // reload state from storage and re-render affected views (simple + robust)
      State = loadAndMigrate();
      rerenderAll();
      if (m.actor && m.actor !== activeUser) toast('Board updated by ' + m.actor, 'info');
    }
  };
}
function broadcast(mutationType, extra={}) {
  if (bc) bc.postMessage(Object.assign({ type:'state-update', mutationType, tabId: TAB_ID, actor: activeUser, timestamp: nowISO() }, extra));
}
function commit(mutationType, extra) { saveState(); broadcast(mutationType, extra); }

/* ============================================================================
   11. MUTATIONS + UNDO/REDO (§30) — all board mutations route through here
   ========================================================================== */
const undoStack = [], redoStack = [];
function pushUndo(op) { undoStack.push(op); if (undoStack.length > 20) undoStack.shift(); redoStack.length = 0; }
function doUndo() {
  const op = undoStack.pop(); if (!op) { toast('Nothing to undo', 'info'); return; }
  const redo = op.inverse(); redoStack.push({ description: op.description, inverse: redo });
  commit('undo'); rerenderAll();
  toast('↩ Undid: ' + op.description, 'info', { label:'Redo', fn: doRedo });
}
function doRedo() {
  const op = redoStack.pop(); if (!op) { toast('Nothing to redo', 'info'); return; }
  const inv = op.inverse(); undoStack.push({ description: op.description, inverse: inv });
  commit('redo'); rerenderAll();
  toast('↪ Redid: ' + op.description, 'info');
}
function taskById(id){ return State.tasks.find(t => t.id === id); }

function setTaskField(task, field, value) { task[field] = value; task.updatedAt = nowISO(); task.lastActivityAt = nowISO(); }

/* Move a task to a new column (the central mutation) */
function moveTask(task, newStatus, opts={}) {
  const prevStatus = task.status;
  if (prevStatus === newStatus && !opts.force) return;
  const prevHistory = JSON.parse(JSON.stringify(task.columnHistory));
  const prevCompleted = task.completedAt;
  // close current history entry
  const open = task.columnHistory.find(h => h.exitedAt === null);
  if (open) open.exitedAt = nowISO();
  task.columnHistory.push({ column: newStatus, enteredAt: nowISO(), exitedAt: null, movedBy: activeUser });
  task.status = newStatus;
  task.updatedAt = nowISO(); task.lastActivityAt = nowISO();
  if (opts.holdReason !== undefined) task.holdReason = opts.holdReason;
  if (newStatus === 'complete') { task.completedAt = nowISO(); resolveBlockers(task); }
  else task.completedAt = null;
  logActivity('moved', task, '→ ' + COL_LABEL[newStatus] + (opts.holdReason? ': '+opts.holdReason : ''), activeUser);
  // notification if someone else owns it
  if (task.assignee && task.assignee !== activeUser)
    notify('moved', `${activeUser} moved ${task.title} → ${COL_LABEL[newStatus]}`, task.id, task.assignee);
  if (!opts.noUndo) pushUndo({ description: `moved '${task.title}' → ${COL_LABEL[newStatus]}`,
    inverse: () => { task.status = prevStatus; task.columnHistory = prevHistory; task.completedAt = prevCompleted; task.updatedAt = nowISO(); } });
}
function resolveBlockers(completedTask) {
  State.tasks.forEach(t => {
    if ((t.blockedBy||[]).includes(completedTask.id) || (t.dependencies||[]).includes(completedTask.id)) {
      pushNotification('blocker-resolved', `${t.title} unblocked — blocker "${completedTask.title}" is complete`, t.id);
    }
  });
}

function createTask(data, opts={}) {
  const now = nowISO();
  const t = Object.assign({
    id: uuid(), title: 'Untitled', status: 'in-queue', assignee: null, priority: 'normal', holdReason: null,
    flagged: false, tags: [], customFields: {}, dependencies: [], blockedBy: [], notes: [], attachments: [],
    embeddedImageBytes: 0, columnHistory: [], type: 'task', templateId: null, isRecurring: false, comments: [],
    estimatedHours: null, actualSessions: [], shift: currentShift(), createdBy: activeUser, createdAt: now,
    updatedAt: now, lastActivityAt: now, completedAt: null, archived: false, columnOrder: Date.now(), timer: null, requestedBy: null,
  }, data);
  t.columnHistory = [{ column: t.status, enteredAt: now, exitedAt: null, movedBy: activeUser }];
  State.tasks.push(t);
  logActivity('created', t, t.type==='request'?'(request)':null, activeUser);
  if (!opts.noUndo) pushUndo({ description: `created '${t.title}'`,
    inverse: () => { State.tasks = State.tasks.filter(x => x.id !== t.id); } });
  return t;
}
function archiveTask(task) {
  const prev = task.archived; task.archived = true; task.updatedAt = nowISO();
  logActivity('archived', task, null, activeUser);
  pushUndo({ description: `archived '${task.title}'`, inverse: () => { task.archived = prev; } });
}
function toggleFlag(task, silent) {
  const prev = task.flagged; task.flagged = !task.flagged; task.updatedAt = nowISO(); task.lastActivityAt = nowISO();
  if (task.flagged) logActivity('flagged', task, null, activeUser);
  if (!silent) pushUndo({ description: `${task.flagged?'flagged':'unflagged'} '${task.title}'`, inverse: () => { task.flagged = prev; } });
}
function setAssignee(task, who) {
  const prev = task.assignee; task.assignee = who; task.updatedAt = nowISO(); task.lastActivityAt = nowISO();
  if (task.type === 'request' && who) { task.type = 'task'; logActivity('assigned', task, `${activeUser} claimed request: "${task.title}"`, activeUser); }
  else logActivity('assigned', task, who ? 'Assigned to '+who : 'Unassigned', activeUser);
  if (who && who !== activeUser) notify('assigned', `${activeUser} assigned you: ${task.title}`, task.id, who);
  pushUndo({ description: `assignee of '${task.title}'`, inverse: () => { task.assignee = prev; } });
}
function setPriority(task, p) {
  const prev = task.priority; task.priority = p; task.updatedAt = nowISO();
  pushUndo({ description: `priority of '${task.title}'`, inverse: () => { task.priority = prev; } });
}

   12. IDENTITY (§37) — ?user= param, sessionStorage, selector modal
   ========================================================================== */
function allMembers(){ return [...State.settings.team.day, ...State.settings.team.night]; }
function resolveIdentity() {
  const params = new URLSearchParams(location.search);
  const urlUser = params.get('user');
  if (urlUser) {
    const match = allMembers().find(m => m.toLowerCase() === urlUser.toLowerCase());
    if (match) {
      activeUser = match; sessionStorage.setItem('activeUser', match);
      State.settings.activeUserId = match; saveNow();
      // URL cleanup — remove ?user= param
      const url = new URL(location.href); url.searchParams.delete('user');
      history.replaceState(null, '', url.pathname + url.search + url.hash);
      return true;
    }
  }
  const sess = sessionStorage.getItem('activeUser');
  if (sess && allMembers().includes(sess)) { activeUser = sess; return true; }
  if (State.settings.activeUserId && allMembers().includes(State.settings.activeUserId)) {
    activeUser = State.settings.activeUserId; sessionStorage.setItem('activeUser', activeUser); return true;
  }
  return false;
}

/* ============================================================================
   15. ANIMATED BACKGROUND (5-layer: void+grid+scanline via CSS; starfield+particles canvas)
   ========================================================================== */
function initBackground() {
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sf = $('#starfield'); const ctx = sf.getContext('2d');
  let W, H, stars = [], particles = [], mouse = { x:0, y:0 }, par = { x:0, y:0 };
  function resize() { W = sf.width = innerWidth; H = sf.height = innerHeight; build(); }
  function build() {
    stars = []; for (let i=0;i<200;i++) stars.push({ x: Math.random()*W, y: Math.random()*H,
      size: 0.3 + Math.random()*1.7, base: 0.2 + Math.random()*0.7, spd: 0.5+Math.random()*2, ph: Math.random()*Math.PI*2 });
    particles = []; for (let i=0;i<18;i++) particles.push({ x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4 });
  }
  addEventListener('resize', resize);
  addEventListener('mousemove', e => { mouse.x = e.clientX - innerWidth/2; mouse.y = e.clientY - innerHeight/2; });
  resize();
  let particlesOn = true, frames = 0, slowFrames = 0, last = performance.now();
  function draw(t) {
    const dt = t - last; last = t; frames++;
    if (dt > 18) slowFrames++; else slowFrames = Math.max(0, slowFrames-1);
    if (slowFrames > 60 && particlesOn) { particlesOn = false; } // FPS guard
    ctx.clearRect(0,0,W,H);
    par.x = lerp(par.x, mouse.x*0.015, 0.05); par.y = lerp(par.y, mouse.y*0.015, 0.05);
    const time = t/1000;
    for (const s of stars) {
      const op = s.base * (0.6 + 0.4*Math.sin(time*s.spd + s.ph));
      ctx.globalAlpha = clamp(op,0,1);
      ctx.fillStyle = '#cfe8ff';
      ctx.fillRect(s.x + par.x, s.y + par.y, s.size, s.size);
    }
    if (particlesOn) {
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1; if (p.y < 0 || p.y > H) p.vy *= -1;
      }
      for (let i=0;i<particles.length;i++) for (let j=i+1;j<particles.length;j++) {
        const a = particles[i], b = particles[j]; const dx=a.x-b.x, dy=a.y-b.y; const d=Math.hypot(dx,dy);
        if (d < 120) { ctx.globalAlpha = (1 - d/120)*0.15; ctx.strokeStyle = 'rgba(0,245,255,1)';
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
      }
      ctx.globalAlpha = 0.4; ctx.fillStyle = 'rgba(0,245,255,1)';
      for (const p of particles) ctx.fillRect(p.x, p.y, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;
    if (!reduce) requestAnimationFrame(draw);
  }
  if (reduce) { ctx.clearRect(0,0,W,H); ctx.globalAlpha=0.6; ctx.fillStyle='#cfe8ff'; for (const s of stars) ctx.fillRect(s.x,s.y,s.size,s.size); }
  else requestAnimationFrame(draw);
}

/* ============================================================================
   17. HASH ROUTER (§24)
   ========================================================================== */
const ROUTES = ['board','log','stats','handoff','weekly','settings'];
let currentRoute = 'board';
function parseHash() {
  const h = location.hash.replace(/^#/, '') || 'board';
  const [path, qs] = h.split('?');
  return { path: ROUTES.includes(path) ? path : 'board', params: new URLSearchParams(qs||'') };
}
function navigate(route, params={}, replace=false) {
  let hash = '#' + route;
  const qp = new URLSearchParams(params);
  const qs = qp.toString(); if (qs) hash += '?' + qs;
  if (replace) history.replaceState(null,'',hash); else location.hash = hash;
}
function handleRoute() {
  const { path, params } = parseHash();
  currentRoute = path;
  ROUTES.forEach(r => $('#view-'+r)?.classList.toggle('active', r===path));
  $$('#navTabs button').forEach(b => b.classList.toggle('active', b.dataset.route===path));
  if (path === 'board') { renderBoard(); const tid = params.get('task'); if (tid) { if (taskById(tid)) openDetail(tid); else toast('Task not found — it may have been archived.','warning'); } }
  else if (path === 'log') renderDailyLog(params.get('date'));
  else if (path === 'stats') renderStats();
  else if (path === 'handoff') renderHandoff();
  else if (path === 'weekly') renderWeekly();
  else if (path === 'settings') renderSettings(params.get('tab'));
}
addEventListener('hashchange', handleRoute);
