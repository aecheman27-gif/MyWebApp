      <span class="spacer"></span>
      <span class="filter-label">Presets</span>
      ${BUILTIN_PRESETS.map(p => `<button class="chip preset ${activePresetId===p.id?'active':''}" data-preset="${p.id}">${esc(p.name)}</button>`).join('')}
      ${State.savedFilterPresets.map(p => `<button class="chip preset ${activePresetId===p.id?'active':''}" data-preset="${p.id}">${esc(p.name)}<span class="del" data-delpreset="${p.id}">✕</span></button>`).join('')}
      <button class="chip" id="savePreset">＋</button>
    </div>`;
  // wire
  $('#newTaskBtn').onclick = () => openCreateModal();
  $$('.chip[data-f]', fb).forEach(c => c.onclick = () => { filters[c.dataset.f] = c.dataset.v; activePresetId=null; renderFilterBar(); renderBoard(); });
  $('#searchInput').addEventListener('input', debounce(e => { filters.search = e.target.value; renderBoard(); }, 150));
  $('#showCompleted').onchange = e => { filters.showCompleted = e.target.checked; renderBoard(); };
  $('#focusToggle').onclick = cycleFocus;
  $$('.chip.preset[data-preset]', fb).forEach(c => c.onclick = (e) => { if (e.target.dataset.delpreset) return; applyPreset(c.dataset.preset); });
  $$('[data-delpreset]', fb).forEach(d => d.onclick = (e) => { e.stopPropagation(); State.savedFilterPresets = State.savedFilterPresets.filter(p=>p.id!==d.dataset.delpreset); commit('preset'); renderFilterBar(); });
  $('#savePreset').onclick = saveCurrentPreset;
}
let presetStatusFilter = null;
function applyPreset(id) {
  const bp = BUILTIN_PRESETS.find(p=>p.id===id);
  if (bp) { const f = bp.apply(); presetStatusFilter = f.statusOnly||null; delete f.statusOnly; filters = Object.assign(filters, f); }
  else { const p = State.savedFilterPresets.find(x=>x.id===id); if (p) { filters = Object.assign({}, filters, p.filters); presetStatusFilter = p.filters.statusOnly||null; } }
  activePresetId = id; renderFilterBar(); renderBoard();
}
function saveCurrentPreset() {
  const name = prompt('Preset name:'); if (!name) return;
  if (State.savedFilterPresets.length >= 6) { toast('Max 6 presets','warning'); return; }
  State.savedFilterPresets.push({ id: uuid(), name, filters: { assignee:filters.assignee, shift:filters.shift, priority:filters.priority, showCompleted:filters.showCompleted } });
  commit('preset'); renderFilterBar(); toast('Preset saved','success');
}
function cycleFocus() { focusMode = (focusMode+1)%3; renderFilterBar(); renderBoard(); }

function taskMatchesFilters(t) {
  if (t.archived) return false;
  if (!filters.showCompleted && t.status === 'complete') return false;
  if (presetStatusFilter && !presetStatusFilter.includes(t.status)) return false;
  if (filters.assignee !== 'all' && t.assignee !== filters.assignee) return false;
  if (filters.shift !== 'all' && t.shift !== filters.shift) return false;
  if (filters.priority !== 'all' && t.priority !== filters.priority) return false;
  if (focusMode === 1 && t.assignee !== activeUser) return false;
  if (focusMode === 2 && !['critical','high'].includes(t.priority)) return false;
  if (filters.search) {
    const hay = [t.title, t.tags.join(' '), stripHTML((t.notes[t.notes.length-1]||{}).content||''),
      Object.values(t.customFields||{}).join(' '), (t.comments||[]).map(c=>c.text).join(' ')].join(' ');
    if (!fuzzy(filters.search, hay) && !hay.toLowerCase().includes(filters.search.toLowerCase())) return false;
  }
  return true;
}
function stripHTML(html){ const d = document.createElement('div'); d.innerHTML = html||''; return d.textContent||''; }

/* ============================================================================
   19. BOARD + CARD RENDERING
   ========================================================================== */
const sortByPriorityCols = {}; // colId -> bool
let focusedCardId = null;
let selectedIds = new Set();

function renderBoard() {
  renderFilterBar();
  const board = $('#board');
  board.classList.toggle('focus-mode', focusMode===1);
  const visibleCols = focusMode === 1 ? COLUMNS : COLUMNS;
  board.innerHTML = visibleCols.map(col => {
    let tasks = State.tasks.filter(t => t.status === col.id && taskMatchesFilters(t));
    // sort: flagged first, then by priority-sort or manual order
    const prioRank = { critical:0, high:1, normal:2, low:3 };
    if (sortByPriorityCols[col.id] || focusMode===1) tasks.sort((a,b)=> (b.flagged-a.flagged) || prioRank[a.priority]-prioRank[b.priority] || a.columnOrder-b.columnOrder);
    else tasks.sort((a,b)=> (b.flagged-a.flagged) || a.columnOrder-b.columnOrder);
    return `<div class="column" data-col="${col.id}">
      <div class="col-header">
        <span class="title">${col.label}</span><span class="count">[${tasks.length}]</span>
        <button class="sort-toggle ${sortByPriorityCols[col.id]?'active':''}" data-sortcol="${col.id}" title="Sort by priority">⇅</button>
        <button class="sort-toggle" data-addcol="${col.id}" title="Add task to ${col.label}" aria-label="Add task to ${col.label}">＋</button>
      </div>
      <div class="col-body" data-col="${col.id}">
        ${tasks.length ? tasks.map(t => cardHTML(t)).join('') : emptyStateHTML(col.id)}
      </div></div>`;
  }).join('');
  wireBoard();
  renderHudBadges();
}
function emptyStateHTML(colId) {
  const msgs = { 'needs-planning':'Nothing to plan', 'in-work':'No active work', 'in-queue':'Queue is clear', 'hold':'Nothing on hold',
    'awaiting':'Nothing awaiting', 'complete':'No completed tasks today' };
  return `<div class="col-empty">${msgs[colId]||'Empty'}<div class="hint">Press <b class="mono">N</b> or click below</div>
    <button class="btn sm" data-addcol="${colId}" style="margin-top:8px">＋ Add task</button></div>`;
}
function ageClass(t) {
  const open = t.columnHistory.find(h=>h.exitedAt===null); if (!open) return '';
  const h = (Date.now() - new Date(open.enteredAt).getTime())/3600000;
  if (h > 168) return 'age-4'; if (h > 72) return 'age-3'; if (h > 24) return 'age-2'; return '';
}
function isStale(t) {
  const rule = State.automationRules.find(r=>r.id==='stale-detection');
  if (!rule || !rule.enabled) return false;
  return (Date.now() - new Date(t.lastActivityAt).getTime()) > rule.thresholdDays*86400000 && t.status!=='complete';
}
function cardHTML(t) {
  const cf = State.customFieldDefs.filter(f=>f.showOnCard && t.customFields[f.id]!=null && t.customFields[f.id]!=='')
    .map(f => `<span class="card-cf"><span class="cf-k">${esc(f.name)}</span> <span class="cf-v">${esc(t.customFields[f.id])}</span></span>`).join('');
  const estTag = t.estimatedHours ? `<span class="card-tag">~${t.estimatedHours}h</span>` : '';
  const tagTags = (t.tags||[]).slice(0,3).map(tg=>`<span class="card-tag">#${esc(tg)}</span>`).join('');
  const open = t.columnHistory.find(h=>h.exitedAt===null);
  const timeIn = open ? COL_LABEL[t.status]+' '+fmtDuration(Date.now()-new Date(open.enteredAt).getTime()) : '';
  const blockedBy = (t.blockedBy||[]).map(id=>taskById(id)).filter(Boolean);
  const blocking = State.tasks.filter(x => (x.blockedBy||[]).includes(t.id));
  const blockerResolved = blockedBy.filter(b=>b.status==='complete');
  const sel = selectedIds.has(t.id);
  return `<div class="task-card ${t.flagged?'flagged':''} ${t.type==='request'?'request':''} ${ageClass(t)} ${focusedCardId===t.id?'focused':''} ${sel?'selected':''}"
      data-id="${t.id}" draggable="true" tabindex="0" role="listitem" aria-selected="${sel}">
    ${t.type==='request'?'<span class="req-badge" style="position:absolute;top:6px;left:6px">REQ</span>':''}
    <button class="card-flag" data-flag="${t.id}" aria-label="Flag">⚑</button>
    <button class="card-menu-btn" data-menu="${t.id}" aria-label="Menu">⋯</button>
    <div class="card-top" ${t.type==='request'?'style="margin-top:8px"':''}>
      <span class="card-drag" data-drag="${t.id}">⣿</span>
      <span class="card-title" data-title="${t.id}">${esc(t.title)}</span>
    </div>
    ${t.holdReason && (t.status==='hold'||t.status==='awaiting') ? `<div class="hold-reason ${t.status==='awaiting'?'awaiting-reason':''}">${esc(t.holdReason)}</div>`:''}
    ${blockedBy.length && !blockerResolved.length ? `<span class="dep-tag">⛔ Blocked by: ${esc(blockedBy.map(b=>b.title).join(', '))}</span>`:''}
    ${blockerResolved.length ? `<span class="dep-tag resolved">⚑ Blocker resolved — ${esc(blockerResolved.map(b=>b.title).join(', '))}</span>`:''}
    ${blocking.length ? `<span class="dep-tag blocking">⛓ Blocking ${blocking.length} task${blocking.length>1?'s':''}</span>`:''}
    <div class="card-line">
      <span class="prio-label p-${t.priority}" title="${t.priority} priority">${t.priority}</span>
      <span class="assignee-chip card-assignee ${!t.assignee?(t.type==='request'?'needs-owner':'unassigned'):''}" data-assignee="${t.id}">
        ${t.assignee ? avatarHTML(t.assignee,20) : (t.type==='request'?'⊕ Needs owner':'Unassigned')}
      </span>
    </div>
    ${cf?`<div class="card-fields">${cf}</div>`:''}
    ${(estTag||tagTags)?`<div class="card-tags-row">${estTag}${tagTags}</div>`:''}
    <div class="card-foot">
      <div class="card-badges">
        ${isStale(t)?'<span class="mini-badge stale">⚠ Stale</span>':''}
        ${ageBadge(t)}
        ${t.isRecurring?'<span class="mini-badge recurring">↻</span>':''}
        ${t.timer&&t.timer.running?'<span class="timer-dot" title="Timer running"></span>':''}
        ${(t.comments||[]).length?`<span class="mini-badge">💬 ${t.comments.length}</span>`:''}
        ${(t.attachments||[]).length?`<span class="mini-badge">📎 ${t.attachments.length}</span>`:''}
      </div>
      <span class="card-time">${timeIn}</span>
    </div>
  </div>`;
}
function ageBadge(t) {
  const open = t.columnHistory.find(h=>h.exitedAt===null); if (!open) return '';
  const ms = Date.now()-new Date(open.enteredAt).getTime(); const h = ms/3600000;
  if (h > 168) return `<span class="mini-badge aging mag" title="Entered ${fmtDateTime(open.enteredAt)}">⧗ 7d+</span>`;
  if (h > 72) return `<span class="mini-badge aging" title="Entered ${fmtDateTime(open.enteredAt)}">⧗ ${fmtDuration(ms)}</span>`;
  return '';
}

/* ============================================================================
   20. BOARD WIRING — drag/drop, reorder, context menu, bulk, inline edits
   ========================================================================== */
let dragId = null;
function wireBoard() {
  const board = $('#board');
  $$('.task-card', board).forEach(card => {
    const id = card.dataset.id;
    card.addEventListener('click', (e) => {
      if (e.target.closest('[data-flag]') || e.target.closest('[data-menu]') || e.target.closest('[data-assignee]') || e.target.closest('[data-title][contenteditable]')) return;
      if (e.shiftKey || e.ctrlKey || e.metaKey) { toggleSelect(id); return; }
      if (selectedIds.size) { clearSelection(); }
      openDetail(id);
    });
    card.addEventListener('dblclick', (e) => { if (e.target.dataset.title) startInlineTitle(e.target, id); });
    card.addEventListener('dragstart', (e) => { dragId = id; card.style.opacity='0.4'; e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragend', () => { card.style.opacity='1'; dragId=null; $$('.drop-placeholder').forEach(p=>p.remove()); });
    card.addEventListener('focus', () => { focusedCardId = id; });
    // flag
    card.querySelector('[data-flag]')?.addEventListener('click', (e) => { e.stopPropagation(); const t=taskById(id); toggleFlag(t); commit('flag'); renderBoard(); });
    card.querySelector('[data-menu]')?.addEventListener('click', (e) => { e.stopPropagation(); openCardMenu(e, id); });
    // assignee cycle (left-click) / dropdown (right-click)
    const ac = card.querySelector('[data-assignee]');
    if (ac) {
      ac.addEventListener('click', (e) => { e.stopPropagation(); cycleAssignee(id); });
      ac.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); openAssigneeMenu(e, id); });
    }
    card.addEventListener('contextmenu', (e) => { e.preventDefault(); openCardMenu(e, id); });
  });
  // column drop targets + within-column reorder
  $$('.col-body', board).forEach(body => {
    body.addEventListener('dragover', (e) => {
      e.preventDefault();
      const col = body.dataset.col;
      body.parentElement.classList.add('drag-over');
      // placeholder for reorder
      $$('.drop-placeholder').forEach(p=>p.remove());
      const after = getDragAfter(body, e.clientY);
      const ph = document.createElement('div'); ph.className='drop-placeholder';
      if (after) body.insertBefore(ph, after); else body.appendChild(ph);
    });
    body.addEventListener('dragleave', () => body.parentElement.classList.remove('drag-over'));
    body.addEventListener('drop', (e) => {
      e.preventDefault(); body.parentElement.classList.remove('drag-over');
      const col = body.dataset.col; const t = taskById(dragId); if (!t) return;
      const ph = body.querySelector('.drop-placeholder');
      // compute new order
      const siblings = $$('.task-card', body).filter(c=>c.dataset.id!==dragId);
      let beforeId = null;
      if (ph) { const next = ph.nextElementSibling; if (next && next.classList.contains('task-card')) beforeId = next.dataset.id; }
      if (t.status !== col) {
        if ((col === 'hold' || col === 'awaiting')) { requireReasonThenMove(t, col, () => { applyReorder(t, col, beforeId); commit('move',{taskId:t.id,newStatus:col}); animateGlitch(t.id); renderBoard(); }); return; }
        moveTask(t, col);
      }
      applyReorder(t, col, beforeId);
      commit('move',{taskId:t.id,newStatus:col}); animateGlitch(t.id); renderBoard();
    });
  });
  $$('[data-sortcol]', board).forEach(b => b.onclick = (e) => { e.stopPropagation(); const c=b.dataset.sortcol; sortByPriorityCols[c]=!sortByPriorityCols[c]; renderBoard(); });
  $$('[data-addcol]', board).forEach(b => b.onclick = (e) => { e.stopPropagation(); const r=b.getBoundingClientRect(); openQuickAdd(r.left, r.bottom+4, b.dataset.addcol); });
}
function getDragAfter(container, y) {
  const cards = $$('.task-card:not([style*="opacity: 0.4"])', container);
  return cards.find(c => { const box = c.getBoundingClientRect(); return y < box.top + box.height/2; });
}
function applyReorder(task, col, beforeId) {
  const inCol = State.tasks.filter(t=>t.status===col && t.id!==task.id).sort((a,b)=>a.columnOrder-b.columnOrder);
  let order;
  if (!beforeId) order = (inCol.length? inCol[inCol.length-1].columnOrder : 0) + 1000;
  else { const idx = inCol.findIndex(t=>t.id===beforeId); const prev = idx>0?inCol[idx-1].columnOrder:0; const next = inCol[idx].columnOrder; order = (prev+next)/2; }
  task.columnOrder = order;
}
function animateGlitch(id) { requestAnimationFrame(()=>{ const c = $(`.task-card[data-id="${id}"]`); if (c){ c.classList.add('glitch'); setTimeout(()=>c.classList.remove('glitch'),250); } }); }

function cycleAssignee(id) {
  const t = taskById(id); const opts = [...allMembers(), null];
  const cur = opts.indexOf(t.assignee); const next = opts[(cur+1)%opts.length];
  setAssignee(t, next); commit('assign'); renderBoard();
  toast('Assigned to ' + (next||'Unassigned'), 'success');
}
function openAssigneeMenu(e, id) {
  const t = taskById(id);
  showCtxMenu(e.clientX, e.clientY, [...allMembers().map(m=>({label:m, fn:()=>{ setAssignee(t,m); commit('assign'); renderBoard(); }})),
    { label:'Unassigned', fn:()=>{ setAssignee(t,null); commit('assign'); renderBoard(); } }]);
}
function startInlineTitle(span, id) {
  span.setAttribute('contenteditable','true'); span.focus();
  const range = document.createRange(); range.selectNodeContents(span); const sel=getSelection(); sel.removeAllRanges(); sel.addRange(range);
  const finish = (save) => {
    span.removeAttribute('contenteditable');
    if (save) { const t=taskById(id); const v=span.textContent.trim(); if (v && v!==t.title){ const prev=t.title; setTaskField(t,'title',v); logActivity('moved',t,'renamed'); pushUndo({description:`renamed task`,inverse:()=>{t.title=prev;}}); commit('rename'); toast('Saved','success'); } renderBoard(); }
    else { span.textContent = taskById(id).title; }
  };
  span.onkeydown = (ev) => { if (ev.key==='Enter'){ ev.preventDefault(); finish(true); } else if (ev.key==='Escape'){ finish(false); } };
  span.onblur = () => finish(true);
}

/* ---- Bulk selection ---- */
function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); renderBoard(); renderBulkBar(); }
function clearSelection() { selectedIds.clear(); renderBulkBar(); renderBoard(); }
function renderBulkBar() {
  const bar = $('#bulkBar');
  if (!selectedIds.size) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  bar.innerHTML = `<span class="count">${selectedIds.size} selected</span>
    <button class="btn sm" id="bulkMove">Move all to ▸</button>
    <button class="btn sm" id="bulkAssign">Assign all to ▸</button>
    <button class="btn sm" id="bulkTag">Add tag</button>
    <button class="btn sm danger" id="bulkArchive">Archive all</button>
    <button class="btn sm ghost" id="bulkClear">✕</button>`;
  $('#bulkClear').onclick = clearSelection;
  $('#bulkMove').onclick = (e) => showCtxMenu(e.clientX, e.clientY, COLUMNS.map(c=>({label:c.label, fn:()=>bulkMove(c.id)})));
  $('#bulkAssign').onclick = (e) => showCtxMenu(e.clientX, e.clientY, [...allMembers().map(m=>({label:m,fn:()=>bulkAssign(m)})),{label:'Unassigned',fn:()=>bulkAssign(null)}]);
  $('#bulkTag').onclick = () => { const tag=prompt('Tag to add:'); if(tag){ ids().forEach(t=>{ if(!t.tags.includes(tag)) t.tags.push(tag); }); commit('bulk'); clearSelection(); toast('Tag added','success'); } };
  $('#bulkArchive').onclick = () => { ids().forEach(t=>archiveTask(t)); commit('bulk'); clearSelection(); toast('Archived','success'); };
  function ids(){ return [...selectedIds].map(taskById).filter(Boolean); }
}
function bulkMove(col) {
  const tasks = [...selectedIds].map(taskById).filter(Boolean);
  const doMove = () => { tasks.forEach(t=>moveTask(t,col,{noUndo:true})); commit('bulk'); clearSelection(); renderBoard(); toast('Moved '+tasks.length+' tasks','success'); };
  if (col==='hold'||col==='awaiting') { requireReasonThenMove(tasks[0], col, (reason)=>{ tasks.forEach(t=>moveTask(t,col,{holdReason:reason,noUndo:true})); commit('bulk'); clearSelection(); renderBoard(); }); }
  else doMove();
}
function bulkAssign(m) { [...selectedIds].map(taskById).filter(Boolean).forEach(t=>{ t.assignee=m; t.updatedAt=nowISO(); }); commit('bulk'); clearSelection(); renderBoard(); toast('Assigned','success'); }

/* ---- Card "⋯" / right-click context menu ---- */
function openCardMenu(e, id) {
  const t = taskById(id);
  const moveSub = COLUMNS.filter(c=>c.id!==t.status).map(c => ({ label: c.label, fn: () => moveFromMenu(t, c.id) }));
  showCtxMenu(e.clientX, e.clientY, [
    { label: '✎ Edit', fn: () => openDetail(id) },
    { label: '⧉ Duplicate', fn: () => { const copy = JSON.parse(JSON.stringify(t)); copy.id=uuid(); copy.title=t.title+' (copy)'; copy.createdAt=nowISO(); copy.columnHistory=[{column:copy.status,enteredAt:nowISO(),exitedAt:null,movedBy:activeUser}]; State.tasks.push(copy); commit('dup'); renderBoard(); toast('Duplicated','success'); } },
    { label: '⊞ Save as Template', fn: () => saveAsTemplate(t) },
    { label: '▸ Move to…', sub: moveSub },
    { label: '⛔ Add dependency / blocked by', fn: () => addDependencyFlow(t) },
    { label: t.flagged?'⚑ Unflag':'⚑ Flag', fn: () => { toggleFlag(t); commit('flag'); renderBoard(); } },
    { label: '🔗 Copy task link', fn: () => { navigator.clipboard?.writeText(location.origin+location.pathname+'#board?task='+t.id); toast('Link copied','success'); } },
    { divider: true },
    { label: '🗄 Archive', danger: true, fn: () => { archiveTask(t); commit('archive'); renderBoard(); toast('Archived — undo available','warning',{label:'Undo',fn:doUndo}); } },
  ]);
}
function moveFromMenu(t, col) {
  if (col==='hold'||col==='awaiting') requireReasonThenMove(t, col, ()=>{ commit('move'); animateGlitch(t.id); renderBoard(); });
  else { moveTask(t, col); commit('move'); animateGlitch(t.id); renderBoard(); }
}
function showCtxMenu(x, y, items) {
  const menu = $('#ctxMenu');
  menu.innerHTML = items.map((it,i) => {
    if (it.divider) return '<div class="ctx-divider"></div>';
    if (it.sub) return `<div class="ctx-item" data-i="${i}">${esc(it.label)}<span class="sub-arrow">▸</span><div class="ctx-sub">${it.sub.map((s,j)=>`<div class="ctx-item" data-i="${i}" data-j="${j}">${esc(s.label)}</div>`).join('')}</div></div>`;
    return `<div class="ctx-item ${it.danger?'danger':''}" data-i="${i}">${esc(it.label)}</div>`;
  }).join('');
  menu.style.left = Math.min(x, innerWidth-230)+'px'; menu.style.top = Math.min(y, innerHeight-items.length*34)+'px';
  menu.classList.add('show');
  $$('.ctx-item', menu).forEach(el => el.onclick = (ev) => {
    ev.stopPropagation();
    const i = +el.dataset.i, j = el.dataset.j;
    const it = items[i]; if (!it) return;
    if (j !== undefined && it.sub) { it.sub[+j].fn(); }
    else if (!it.sub) it.fn();
    closeCtxMenu();
  });
}
function closeCtxMenu(){ $('#ctxMenu').classList.remove('show'); }
document.addEventListener('click', (e)=>{ if(!e.target.closest('#ctxMenu')) closeCtxMenu(); });
document.addEventListener('scroll', closeCtxMenu, true);

/* ---- Hold/Awaiting reason gate ---- */
function requireReasonThenMove(task, col, after) {
  const ov = $('#overlay2');
  ov.innerHTML = `<div class="modal" style="max-width:420px"><div class="modal-head"><h2>Reason required — ${COL_LABEL[col]}</h2><button class="close" data-close>✕</button></div>
    <div class="modal-body"><div class="field"><label>Why is this ${col==='hold'?'on hold':'awaiting'}?</label>
    <textarea id="reasonInput" placeholder="e.g. K42 relay ETA tomorrow 0700">${esc(task.holdReason||'')}</textarea></div></div>
    <div class="modal-foot"><button class="btn ghost" data-close>Cancel</button><button class="btn primary" id="reasonOk">Confirm Move</button></div></div>`;
  ov.classList.add('show');
  $('#reasonInput').focus();
  const close = () => { ov.classList.remove('show'); ov.innerHTML=''; };
  $$('[data-close]', ov).forEach(b=>b.onclick=close);
  $('#reasonOk').onclick = () => {
    const reason = $('#reasonInput').value.trim();
    if (!reason) { toast('Reason required','warning'); return; }
    if (task.status !== col) moveTask(task, col, { holdReason: reason });
    else task.holdReason = reason;
    close(); after(reason);
  };
}

/* ============================================================================
   21. QUICK-ADD (N key) + CREATE/EDIT MODAL
   ========================================================================== */
let quickAddPos = { x: 200, y: 200 };
function openQuickAdd(x, y, presetStatus) {
  const qa = $('#quickAdd');
  qa.style.left = Math.min(x||quickAddPos.x, innerWidth-340)+'px';
  qa.style.top = Math.min(y||quickAddPos.y, innerHeight-160)+'px';
  const defStatus = presetStatus || 'in-queue';

function actualTotalMs(t){ let sum=(t.actualSessions||[]).reduce((a,s)=>a+(s.ms||0),0); if(t.timer&&t.timer.running) sum+=Date.now()-t.timer.startedAt; return sum; }

  const ms = actualTotalMs(t); if (!ms && !(t.actualSessions||[]).length) return '';

  let cls=''; if (t.estimatedHours){ const ratio = ms/(t.estimatedHours*3600000); if (ratio>2) cls='style="color:var(--neon-magenta)"'; else if (ratio>1) cls='style="color:var(--col-hold)"'; }

let timerInterval = null;
function wireDetail(t) {
  const panel = $('#detailPanel');
  $('#detailClose').onclick = closeDetail;

  $('#dPriority').onchange = (e) => { setPriority(t, e.target.value); commit('priority'); renderBoard(); };

  $('#dHoldReason')?.addEventListener('change', e => { t.holdReason = e.target.value; commit('edit'); renderBoard(); });
  State.customFieldDefs.forEach(f => { const el=$(`#dcf_${f.id}`); if(el) el.onchange=()=>{ t.customFields[f.id]=el.value; commit('edit'); renderBoard(); }; });
  // timer
  $('#timerBtn').onclick = () => toggleTimer(t);
  if (t.timer && t.timer.running) startTimerTick(t);
  // dependencies
  $('#addDep').onclick = () => addDependencyFlow(t);
  $$('[data-gotodep]', panel).forEach(d=>d.onclick=(e)=>{ if(e.target.dataset.rmdep) return; openDetail(d.dataset.gotodep); });
  $$('[data-rmdep]', panel).forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); t.blockedBy=(t.blockedBy||[]).filter(x=>x!==b.dataset.rmdep); t.dependencies=t.blockedBy; commit('edit'); openDetail(t.id); renderBoard(); });
  // version history
  $('#toggleVersions').onclick = () => { const vl=$('#versionList'); vl.classList.toggle('hidden'); if(!vl.classList.contains('hidden')) renderVersions(t); };
  // comments
  const ci = $('#commentInput');

  ci.addEventListener('keydown', e => { if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); postComment(t); } });
  ci.addEventListener('input', e => handleMentionTrigger(e, ci, false));
  $$('[data-delc]', panel).forEach(b=>b.onclick=()=>{ if(confirm('Delete your comment?')){ t.comments=t.comments.filter(c=>c.id!==b.dataset.delc); commit('comment'); openDetail(t.id); } });
  // editor + attachments
  initEditor(t);
  renderAttachments(t);
  initAttachmentDrop(t);
}

/* ---- Timer ---- */
function toggleTimer(t) {
  if (t.timer && t.timer.running) { // stop
    const ms = Date.now()-t.timer.startedAt; (t.actualSessions=t.actualSessions||[]).push({ ms, endedAt: nowISO() });
    t.timer = null; clearInterval(timerInterval);
  } else { // stop any other running timer
    State.tasks.forEach(x => { if (x.timer && x.timer.running) { x.actualSessions=(x.actualSessions||[]); x.actualSessions.push({ms:Date.now()-x.timer.startedAt, endedAt:nowISO()}); x.timer=null; } });
    t.timer = { running: true, startedAt: Date.now() };
  }
  commit('timer'); openDetail(t.id); renderBoard();
}
function startTimerTick(t) {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => { const el=$('#timerLive'); if(el&&t.timer) el.textContent=fmtTimer(Date.now()-t.timer.startedAt); else clearInterval(timerInterval); }, 1000);
}

/* ---- Comments ---- */
function postComment(t) {
  const ci = $('#commentInput'); const text = ci.value.trim(); if (!text) return;
  t.comments = t.comments||[]; t.comments.push({ id: uuid(), text, author: activeUser, timestamp: nowISO() });
  t.lastActivityAt = nowISO();
  logActivity('comment_added', t, text.slice(0,60));
  commit('comment'); ci.value=''; $('#commentList').innerHTML = commentsHTML(t); renderBoard();
  $$('[data-delc]', $('#detailPanel')).forEach(b=>b.onclick=()=>{ if(confirm('Delete your comment?')){ t.comments=t.comments.filter(c=>c.id!==b.dataset.delc); commit('comment'); openDetail(t.id); } });
}

/* ---- Dependencies ---- */

  const ov = $('#overlay2');

  ov.innerHTML = `<div class="modal" style="max-width:460px"><div class="modal-head"><h2>Add "blocked by"</h2><button class="close" data-close>✕</button></div>

    <div id="depResults" style="max-height:300px;overflow:auto"></div></div></div>`;
  ov.classList.add('show');
  const render = (q) => { $('#depResults').innerHTML = candidates.filter(x=>fuzzy(q,x.title)||x.title.toLowerCase().includes((q||'').toLowerCase()))
    .slice(0,30).map(x=>`<div class="ctx-item" data-pick="${x.id}">${esc(x.title)} <span class="muted tiny right">${COL_LABEL[x.status]}</span></div>`).join('') || '<div class="muted tiny">No matches</div>';

  render('');
  $('#depSearch').oninput = (e)=>render(e.target.value); $('#depSearch').focus();
  $$('[data-close]', ov).forEach(b=>b.onclick=()=>{ ov.classList.remove('show'); ov.innerHTML=''; });

function handleMarkdownShortcuts() {
  const sel = getSelection(); if (!sel.rangeCount) return;
  const node = sel.anchorNode; if (!node || node.nodeType!==3) return;
  const text = node.textContent; const off = sel.anchorOffset;
  const before = text.slice(0, off);
  // line-start triggers
  const lineStart = before.replace(/ /g,' ');
  const replaceLineStart = (pattern, action) => {
    const m = lineStart.match(pattern); if (m) { node.textContent = text.slice(m[0].length); placeCaret(node,0); action(); return true; } return false;
  };
  if (/^# $/.test(lineStart)) { node.textContent=text.slice(2); document.execCommand('formatBlock',false,'h1'); editorChanged(); return; }
  if (/^## $/.test(lineStart)) { node.textContent=text.slice(3); document.execCommand('formatBlock',false,'h2'); editorChanged(); return; }
  if (/^### $/.test(lineStart)) { node.textContent=text.slice(4); document.execCommand('formatBlock',false,'h3'); editorChanged(); return; }
  if (/^[-*] $/.test(lineStart)) { node.textContent=text.slice(2); document.execCommand('insertUnorderedList'); editorChanged(); return; }
  if (/^1\. $/.test(lineStart)) { node.textContent=text.slice(3); document.execCommand('insertOrderedList'); editorChanged(); return; }
  if (/^\[\] $/.test(lineStart) || /^\[ \] $/.test(lineStart)) { node.textContent=''; editorAction('checklist'); editorChanged(); return; }
  if (/^```$/.test(lineStart)) { node.textContent=''; editorAction('codeblock'); editorChanged(); return; }
  if (/^---$/.test(lineStart)) { node.textContent=''; document.execCommand('insertHorizontalRule'); editorChanged(); return; }
  // inline **bold**, *italic*, ~~strike~~, `code`
  inlineMarkdown(node, sel);
}
function inlineMarkdown(node, sel) {
  const text = node.textContent; const off = sel.anchorOffset;
  const tryWrap = (re, tag) => {
    const sub = text.slice(0, off); const m = sub.match(re); if (!m) return false;
    const full = m[0], inner = m[1]; const start = off - full.length;
    const range = document.createRange(); range.setStart(node, start); range.setEnd(node, off); sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('insertHTML', false, `<${tag}>${esc(inner)}</${tag}>&nbsp;`.replace('&nbsp;',''));
    editorChanged(); return true;
  };
  if (tryWrap(/\*\*([^*]+)\*\*$/, 'strong')) return;
  if (tryWrap(/~~([^~]+)~~$/, 's')) return;
  if (tryWrap(/`([^`]+)`$/, 'code')) return;
  if (tryWrap(/(?:^|[^*])\*([^*]+)\*$/, 'em')) return;
}

}

function tableOp(cell, op) {
  const row = cell.parentElement, table = cell.closest('table'), idx = Array.from(row.children).indexOf(cell);
  const mkRow = (n) => { const tr=document.createElement('tr'); for(let i=0;i<n;i++){ const td=document.createElement('td'); td.innerHTML='&nbsp;'; tr.appendChild(td); } return tr; };
  if (op==='rowAbove') row.parentElement.insertBefore(mkRow(row.children.length), row);
  else if (op==='rowBelow') row.parentElement.insertBefore(mkRow(row.children.length), row.nextSibling);
  else if (op==='colLeft'||op==='colRight') $$('tr',table).forEach(tr=>{ const td=document.createElement(tr.children[0].tagName.toLowerCase()); td.innerHTML='&nbsp;'; tr.insertBefore(td, op==='colLeft'?tr.children[idx]:tr.children[idx].nextSibling); });
  else if (op==='delRow') row.remove();

function saveNote(t) {

function renderVersions(t) {

  const vl = $('#versionList');
  if (!note || !(note.versions||[]).length) { vl.innerHTML = '<div class="muted tiny">No saved versions yet</div>'; return; }
  vl.innerHTML = note.versions.slice().reverse().map((v,i) => `<div class="version-entry" data-vi="${note.versions.length-1-i}">${fmtDateTime(v.savedAt)} — ${esc(v.savedBy)} — saved</div>`).join('');
  $$('.version-entry', vl).forEach(el => el.onclick = () => {
    const vi = +el.dataset.vi; const prev = note.versions[vi].content; const next = note.versions[vi+1]?note.versions[vi+1].content:note.content;
    const existing = el.nextElementSibling;
    if (existing && existing.classList.contains('version-diff')) { existing.remove(); return; }
    const diff = document.createElement('div'); diff.className='version-diff'; diff.innerHTML = simpleDiff(stripHTML(prev), stripHTML(next));

function simpleDiff(a, b) {
  const aw = a.split(/\s+/), bw = b.split(/\s+/); const bset = new Set(bw), aset = new Set(aw);
  const out = [];
  bw.forEach(w => out.push(aset.has(w) ? esc(w) : `<span class="diff-add">${esc(w)}</span>`));
  aw.forEach(w => { if (!bset.has(w)) out.push(`<span class="diff-del">${esc(w)}</span>`); });
  return out.join(' ') || '<span class="muted">(no text)</span>';
}

async function renderAttachments(t) {
  const grid = $('#attachGrid'); if (!grid) return;
  $('#attachCount').textContent = (t.attachments||[]).length ? `(${t.attachments.length})` : '';
  if (!(t.attachments||[]).length) { grid.innerHTML='<div class="muted tiny">No attachments</div>'; return; }

      `<div class="fn" title="${esc(a.filename)}">${esc(a.filename)}</div><div class="muted">${fmtBytes(a.sizeBytes)} · ${esc(a.uploadedBy||'')}</div>

    el.querySelector('[data-dela]').onclick = async () => { if(confirm('Delete attachment?')){ await DB.del('attachments', a.id); t.attachments=t.attachments.filter(x=>x.id!==a.id); commit('attach'); renderAttachments(t); renderBoard(); } };
  }
}

async function addAttachment(t, file, name) {

/* ============================================================================
   28. AUTOMATION RULES ENGINE (§35)
   ========================================================================== */
function runAutomations(onLoad) {
  const rules = State.automationRules;
  let changed = false;
  const stale = rules.find(r=>r.id==='stale-detection');
  // stale is computed visually (isStale) — no state change needed, just re-render
  const esc1 = rules.find(r=>r.id==='auto-escalate');
  if (esc1?.enabled) {
    State.tasks.forEach(t => {
      if (t.archived || t.status==='complete') return;
      const open = t.columnHistory.find(h=>h.exitedAt===null); if (!open) return;
      const hours = (Date.now()-new Date(open.enteredAt).getTime())/3600000;
      const cfg = (esc1.escalations||[]).find(e=>e.column===t.status);
      if (cfg && hours > cfg.hours && t.priority!=='critical') {
        const idx = PRIORITIES.indexOf(t.priority); const np = PRIORITIES[Math.min(idx+1, PRIORITIES.length-1)];
        // escalate at most once per column visit (keyed by entry timestamp)
        if (np !== t.priority && t._lastEscalatedColumn !== open.enteredAt) {
          t.priority = np; t._lastEscalatedColumn = open.enteredAt;
          logActivity('moved', t, `auto-escalated → ${np}`, 'Automation');
          logRule(`Escalated "${t.title}" to ${np} (>${cfg.hours}h in ${COL_LABEL[t.status]})`);
          if (t.assignee) notify('escalated', `${t.title} auto-escalated to ${np}`, t.id, t.assignee);
          changed = true;
        }
      }
    });
  }
  if (onLoad) {
    const arch = rules.find(r=>r.id==='auto-archive');
    if (arch?.enabled) {
      State.tasks.forEach(t => {
        if (!t.archived && t.status==='complete' && t.completedAt && (Date.now()-new Date(t.completedAt).getTime()) > arch.thresholdDays*86400000) {
          t.archived = true; logActivity('archived', t, 'auto-archived', 'Automation'); logRule(`Auto-archived "${t.title}"`); changed=true;
        }
      });
    }
  }
  if (changed) { commit('automation'); renderBoard(); }
}
function logRule(msg) { State.rulesLog.unshift({ msg, at: nowISO() }); State.rulesLog = State.rulesLog.slice(0,50); }

/* ============================================================================
   31. STATS DASHBOARD (§32) — inline SVG, no charting library
   ========================================================================== */
let statsRange = 'week';
function rangeStart() {
  const d = new Date();
  if (statsRange==='week') { d.setDate(d.getDate()-7); }
  else if (statsRange==='lastweek') { d.setDate(d.getDate()-14); }
  else if (statsRange==='30') { d.setDate(d.getDate()-30); }
  d.setHours(0,0,0,0); return d;
}
function renderStats() {
  const w = $('#statsWrap');
  const start = rangeStart().getTime();
  const tasks = State.tasks.filter(t=>!t.archived);
  // Panel 1: completed per person
  const completed = {}; allMembers().forEach(m=>completed[m]=0);
  tasks.filter(t=>t.status==='complete'&&t.completedAt&&new Date(t.completedAt).getTime()>=start).forEach(t=>{ if(t.assignee) completed[t.assignee]=(completed[t.assignee]||0)+1; });
  const maxC = Math.max(1, ...Object.values(completed));
  // Panel 2: avg time in column
  const colTimes = {}; COLUMNS.forEach(c=>colTimes[c.id]=[]);
  tasks.forEach(t=>t.columnHistory.forEach(h=>{ const end=h.exitedAt?new Date(h.exitedAt):new Date(); const dur=(end-new Date(h.enteredAt))/3600000; if(colTimes[h.column]) colTimes[h.column].push(dur); }));
  const avgCol = {}; COLUMNS.forEach(c=>{ const a=colTimes[c.id]; avgCol[c.id]=a.length?a.reduce((x,y)=>x+y,0)/a.length:0; });
  const maxAvg = Math.max(1, ...Object.values(avgCol));
  // Panel 3: handoff health
  const handoffs = State.handoffs.filter(h=>new Date(h.submittedAt).getTime()>=start);

let weeklyTab = 'copy';
function weekRange() { const end=new Date(); const start=new Date(); start.setDate(start.getDate()-7); return {start,end}; }
function buildWeeklyData() {
  const { start, end } = weekRange(); const s = start.getTime();
  const tasks = State.tasks.filter(t=>!t.archived);
  const completed = tasks.filter(t=>t.status==='complete'&&t.completedAt&&new Date(t.completedAt).getTime()>=s);
  const inProgress = tasks.filter(t=>['in-work','in-queue'].includes(t.status));
  const holds = tasks.filter(t=>['hold','awaiting'].includes(t.status));
  const requests = tasks.filter(t=>t.type==='request');
  const flaggedCrit = tasks.filter(t=>t.priority==='critical'||t.flagged);
  const stuck = tasks.filter(t=>{ const o=t.columnHistory.find(h=>h.exitedAt===null); return o&&['hold','awaiting'].includes(t.status)&&(Date.now()-new Date(o.enteredAt).getTime())>3*86400000; });
  const dateRange = `${fmtDateKey(start)} to ${fmtDateKey(end)}`;
  let data = `WEEK OF: ${dateRange}\nTEAM: ${State.settings.team.day.join(', ')} (Day) / ${State.settings.team.night.join(', ')} (Night)\n\n`;
  data += `TASKS COMPLETED (${completed.length}):\n` + (completed.map(t=>`- ${t.title} — ${t.assignee||'unassigned'} — ${t.completedAt?fmtDateKey(t.completedAt):''}`).join('\n')||'- none') + '\n\n';
  data += `TASKS IN PROGRESS (${inProgress.length}):\n` + (inProgress.map(t=>`- ${t.title} — ${COL_LABEL[t.status]} — ${t.assignee||'unassigned'} — ${stripHTML((t.notes[t.notes.length-1]||{}).content||'').slice(0,80)}`).join('\n')||'- none') + '\n\n';
  data += `ON HOLD / AWAITING (${holds.length}):\n` + (holds.map(t=>`- ${t.title} — ${t.holdReason||'no reason'}`).join('\n')||'- none') + '\n\n';
  if (requests.length) data += `REQUESTS RAISED THIS WEEK (${requests.length}):\n` + requests.map(t=>`- ${t.title} — requested by ${t.requestedBy||'?'}`).join('\n') + '\n\n';
  if (stuck.length) data += `STUCK >3 DAYS:\n` + stuck.map(t=>`- ${t.title} (${COL_LABEL[t.status]})`).join('\n') + '\n\n';
  data += `NOTABLE EVENTS / ANOMALIES:\n` + (flaggedCrit.map(t=>`- ${t.title}${t.holdReason?': '+t.holdReason:''}`).join('\n')||'- none');
  return { data, dateRange };
}

/* ---- Anthropic Messages API caller (streaming SSE) ---- */
async function callAnthropic({ system, user, maxTokens, model='claude-sonnet-4-6', onChunk, onDone, onError }) {
  const key = State.settings.anthropicApiKey;
  if (!key) { onError && onError('No API key configured'); return; }
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type':'application/json', 'x-api-key': key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model, max_tokens: maxTokens||1024, system, stream: true, messages: [{ role:'user', content: user }] }),
    });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      if (res.status===401) msg='Invalid API key (401)'; else if (res.status===429) msg='Rate limited (429) — try again shortly'; else if (res.status>=500) msg='Anthropic server error ('+res.status+')';
      try { const j=await res.json(); if(j.error?.message) msg+=' — '+j.error.message; } catch(e){}
      onError && onError(msg); return;
    }
    const reader = res.body.getReader(); const dec = new TextDecoder(); let buf='', text='';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream:true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim(); if (payload==='[DONE]') continue;
        try { const ev = JSON.parse(payload); if (ev.type==='content_block_delta' && ev.delta?.text){ text+=ev.delta.text; onChunk && onChunk(text); } } catch(e){}
      }
    }
    onDone && onDone(text);
  } catch (e) {
    onError && onError(e.message.includes('Failed to fetch')?'Network/CORS error — the Anthropic API may block direct browser calls from this origin':e.message);
  }
}

    <div class="field"><label class="toggle-switch"><input type="checkbox" id="r_arch" ${arch.enabled?'checked':''}> Auto-archive completed</label>
      <div class="tiny sec">Archive Complete tasks after <input type="number" id="r_archN" value="${arch.thresholdDays}" style="width:50px"> days</div></div>
    <button class="btn primary" id="saveRules">Save Rules</button></div>
    <div class="panel"><h2>Rules Log <span class="muted tiny">(last 50)</span></h2>
      ${State.rulesLog.length?State.rulesLog.map(l=>`<div class="log-line"><span class="lt">${fmtTime(l.at)}</span><span class="ld">${esc(l.msg)}</span></div>`).join(''):'<div class="muted">No automated actions yet</div>'}</div>`;
  $('#saveRules').onclick=()=>{ stale.enabled=$('#r_stale').checked; stale.thresholdDays=+$('#r_staleN').value;
    esc1.enabled=$('#r_esc').checked; esc1.escalations=[{column:'in-work',hours:+$('#r_escIw').value},{column:'hold',hours:+$('#r_escHold').value}];
    arch.enabled=$('#r_arch').checked; arch.thresholdDays=+$('#r_archN').value; commit('settings'); renderBoard(); toast('Rules saved','success'); };
}
function renderSettingsAnnouncements(c) {
  c.innerHTML = `<div class="panel"><h2>Announcement History <span class="muted tiny">(last 30)</span></h2>
    ${State.announcements.slice().reverse().map(a=>`<div class="log-line"><span class="status-badge" style="color:${a.urgency==='critical'?'var(--neon-magenta)':a.urgency==='warning'?'var(--col-hold)':'var(--col-inwork)'}">${a.urgency}</span>
      <span class="ld">${esc(a.text)} <span class="muted">— ${esc(a.postedBy)} ${fmtDateTime(a.postedAt)}${a.clearedBy?' · cleared by '+esc(a.clearedBy):''}</span></span></div>`).join('')||'<div class="muted">No announcements</div>'}</div>`;
}
async function renderSettingsStorage(c) {
  const lsBytes = new Blob([localStorage.getItem(LS_KEY)||'']).size;
  let idbInfo = 'n/a';
  if (navigator.storage?.estimate) { const { usage, quota } = await navigator.storage.estimate(); idbInfo = `${fmtBytes(usage||0)} / ${fmtBytes(quota||0)} (${Math.round((usage/quota)*100)||0}%)`; }
  const attachKeys = await DB.keys('attachments');
  const pct = navigator.storage?.estimate ? (await navigator.storage.estimate()).usage/((await navigator.storage.estimate()).quota||1)*100 : 0;
  c.innerHTML = `<div class="panel"><h2>Storage Usage</h2>
    <div class="tiny sec">localStorage (text/metadata): <b>${fmtBytes(lsBytes)}</b></div>
    <div class="meter"><div class="fill ${lsBytes>1.6e6?'crit':lsBytes>1e6?'warn':''}" style="width:${Math.min(100,lsBytes/2e6*100)}%"></div></div>
    <div class="tiny sec mt8">IndexedDB (binary): <b>${idbInfo}</b> · ${attachKeys.length} attachments</div>
    <div class="meter"><div class="fill ${pct>80?'crit':pct>60?'warn':''}" style="width:${Math.min(100,pct)}%"></div></div>
    </div>
    <div class="panel"><h2>Cleanup Actions</h2>
      <button class="btn sm" id="clearCompleted">Clear completed tasks</button>
      <button class="btn sm" id="clearOldAttach">Clear attachments older than 30 days</button>
      <button class="btn sm" id="compactVersions">Compact note versions</button></div>`;
  $('#clearCompleted').onclick=()=>{ if(confirm('Archive all completed tasks?')){ State.tasks.forEach(t=>{ if(t.status==='complete') t.archived=true; }); commit('cleanup'); renderBoard(); toast('Cleared','success'); renderSettings(); } };
  $('#clearOldAttach').onclick=async()=>{ let n=0; for(const t of State.tasks){ const keep=[]; for(const a of (t.attachments||[])){ if(Date.now()-new Date(a.uploadedAt).getTime()>30*86400000){ await DB.del('attachments',a.id); n++; } else keep.push(a); } t.attachments=keep; } commit('cleanup'); toast(`Removed ${n} old attachments`,'success'); renderSettings(); };
  $('#compactVersions').onclick=()=>{ State.tasks.forEach(t=>t.notes.forEach(n=>{ if(n.versions) n.versions=n.versions.slice(-5); })); commit('cleanup'); toast('Note versions compacted','success'); };
}
function renderSettingsDanger(c) {
  c.innerHTML = `<div class="panel"><h2>Data Management</h2>
    <button class="btn" id="exportJson">⬇ Export all data (JSON)</button>
    <button class="btn" id="importJson">⬆ Import from JSON</button>
    <input type="file" id="importFile" accept=".json" class="hidden">
    <div style="margin-top:24px;border-top:1px solid var(--border-default);padding-top:16px">
      <button class="btn danger" id="resetApp">⚠ Reset App (wipe all storage)</button></div></div>`;
  $('#exportJson').onclick=()=>downloadFile('specialist-turnover-backup.json', JSON.stringify(State,null,2), 'application/json');
  $('#importJson').onclick=()=>$('#importFile').click();
  $('#importFile').onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const reader=new FileReader();
    reader.onload=()=>{ try { const data=JSON.parse(reader.result); const mode=confirm('OK = Replace all data. Cancel = Merge tasks.')?'replace':'merge';
      if(mode==='replace'){ State=data; } else { State.tasks.push(...(data.tasks||[])); }
      saveNow(); toast('Imported','success'); rerenderAll(); } catch(err){ toast('Invalid JSON','error'); } };
    reader.readAsText(f); };
  $('#resetApp').onclick=()=>{ if(confirm('This wipes ALL data. Continue?')&&confirm('Are you absolutely sure?')){ localStorage.removeItem(LS_KEY); indexedDB.deleteDatabase('specialist-turnover'); sessionStorage.clear(); location.reload(); } };
}

/* ============================================================================
   34. COMMAND PALETTE (§29)
   ========================================================================== */
let cmdSel = 0, cmdItems = [];
function openCommandPalette() {
  const ov = $('#overlay');
  ov.innerHTML = `<div class="cmd-palette"><input type="text" id="cmdInput" placeholder="Type a command or task title…" autocomplete="off"><div class="cmd-results" id="cmdResults"></div></div>`;
  ov.classList.add('show');
  const input = $('#cmdInput'); input.focus();
  const update = () => { cmdItems = buildCommands(input.value); cmdSel=0; renderCmd(); };
  input.oninput = update;
  input.onkeydown = (e) => {
    if (e.key==='ArrowDown'){ e.preventDefault(); cmdSel=Math.min(cmdSel+1,cmdItems.length-1); renderCmd(); }
    else if (e.key==='ArrowUp'){ e.preventDefault(); cmdSel=Math.max(cmdSel-1,0); renderCmd(); }
    else if (e.key==='Enter'){ e.preventDefault(); cmdItems[cmdSel]?.fn(); closeOverlay(); }
    else if (e.key==='Escape'){ closeOverlay(); }
  };
  update();
}
function buildCommands(q) {
  const actions = [
    { cat:'action', label:'New task', kbd:'N', fn:()=>{ closeOverlay(); openCreateModal(); } },
    { cat:'action', label:'Open handoff panel', kbd:'H', fn:()=>navigate('handoff') },
    { cat:'action', label:'Open daily log', kbd:'L', fn:()=>navigate('log') },
    { cat:'action', label:'Open weekly summary', kbd:'W', fn:()=>navigate('weekly') },
    { cat:'action', label:'Open stats', kbd:'S', fn:()=>navigate('stats') },
    { cat:'action', label:'Open settings', fn:()=>navigate('settings') },
    { cat:'action', label:'Toggle focus mode', kbd:'F', fn:cycleFocus },
    { cat:'action', label:'Toggle theme', fn:()=>{ State.settings.theme=State.settings.theme==='light'?'dark':'light'; commit('settings'); applyTheme(); } },
    { cat:'action', label:"Export today's log", fn:()=>{ const ev=State.activityFeed.filter(e=>fmtDateKey(e.timestamp)===fmtDateKey(new Date())); exportLogTxt(fmtDateKey(new Date()),ev); } },
    { cat:'action', label:'Open shift notes', kbd:'P', fn:openNotepad },
  ];
  let items = actions.filter(a=>!q || fuzzy(q,a.label) || a.label.toLowerCase().includes(q.toLowerCase()));
  // task nav + actions
  if (q) {
    const tasks = State.tasks.filter(t=>!t.archived && (fuzzy(q,t.title)||t.title.toLowerCase().includes(q.toLowerCase()))).slice(0,8);
    tasks.forEach(t=>{ items.push({ cat:'task', label:'Open: '+t.title, fn:()=>openDetail(t.id) }); });
  }
  return items;
}
function renderCmd() {
  $('#cmdResults').innerHTML = cmdItems.map((it,i)=>`<div class="cmd-item ${i===cmdSel?'sel':''}" data-ci="${i}"><span class="cat">${it.cat}</span> ${esc(it.label)} ${it.kbd?`<span class="kbd">${it.kbd}</span>`:''}</div>`).join('') || '<div class="cmd-item muted">No results</div>';
  $$('.cmd-item[data-ci]').forEach(el=>{ el.onmouseenter=()=>{ cmdSel=+el.dataset.ci; }; el.onclick=()=>{ cmdItems[+el.dataset.ci]?.fn(); closeOverlay(); }; });
}
function closeOverlay(){ $('#overlay').classList.remove('show'); $('#overlay').innerHTML=''; }

/* ============================================================================
   35. KEYBOARD SHORTCUTS (global)
   ========================================================================== */
function shortcutsModalHTML() {
  const rows = [['Ctrl+K','Command palette'],['N','Quick-add task'],['J / K','Focus prev/next card'],['← / →','Jump column'],['Enter','Open focused card'],
    ['Space','Toggle flag'],['M','Move submenu'],['F','Cycle focus mode'],['H','Handoff'],['L','Daily log'],['S','Stats'],['W','Weekly'],['P','Shift notes'],
    ['Ctrl+Z','Undo'],['Ctrl+Shift+Z','Redo'],['Ctrl+Enter','Save / post'],['Ctrl+\\','Split panel'],['Escape','Close / deselect'],['?','This help']];
  return `<div class="modal"><div class="modal-head"><h2>Keyboard Shortcuts</h2><button class="close" data-close>✕</button></div>
    <div class="modal-body"><div class="kbd-table">${rows.map(([k,d])=>`<span class="k">${esc(k)}</span><span>${esc(d)}</span>`).join('')}</div></div></div>`;
}
function showShortcuts(){ const ov=$('#overlay'); ov.innerHTML=shortcutsModalHTML(); ov.classList.add('show'); $$('[data-close]',ov).forEach(b=>b.onclick=closeOverlay); }

let focusedCol = 0;
function getColumnTasks(colId) { return $$(`.col-body[data-col="${colId}"] .task-card`).map(c=>c.dataset.id); }
function moveFocus(dir) {
  const colTasks = getColumnTasks(COLUMNS[focusedCol].id);
  let idx = colTasks.indexOf(focusedCardId);
  idx = clamp(idx + dir, 0, colTasks.length-1);
  focusedCardId = colTasks[idx]; highlightFocus();
}
function jumpColumn(dir) {
  focusedCol = clamp(focusedCol+dir, 0, COLUMNS.length-1);
  const colTasks = getColumnTasks(COLUMNS[focusedCol].id);
  focusedCardId = colTasks[0]||null; highlightFocus();
}
function highlightFocus() {
  $$('.task-card').forEach(c=>c.classList.toggle('focused', c.dataset.id===focusedCardId));
  const el = $(`.task-card[data-id="${focusedCardId}"]`); el?.scrollIntoView({block:'nearest'});
}
function handleGlobalKeys(e) {
  const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName) || e.target.isContentEditable;
  // Ctrl+K always
  if ((e.ctrlKey||e.metaKey) && (e.key==='k'||e.key==='K')) { e.preventDefault(); openCommandPalette(); return; }
  if ((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z') && !typing) { e.preventDefault(); if(e.shiftKey) doRedo(); else doUndo(); return; }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y'||e.key==='Y') && !typing) { e.preventDefault(); doRedo(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='\\') { e.preventDefault(); if(detailTaskId){ const s=localStorage.getItem('splitMode')==='1'; localStorage.setItem('splitMode',s?'0':'1'); openDetail(detailTaskId); } return; }
  if (e.key==='Escape') { closeCtxMenu(); $('#mentionPop').classList.remove('show'); if($('#overlay2').classList.contains('show')){ $('#overlay2').classList.remove('show'); $('#overlay2').innerHTML=''; return; } if($('#overlay').classList.contains('show')){ closeOverlay(); return; } if(detailTaskId){ closeDetail(); return; } if(selectedIds.size){ clearSelection(); return; } if(focusMode){ focusMode=0; renderBoard(); } focusedCardId=null; highlightFocus(); return; }
  if (typing) return;
  // single-key shortcuts
  if (e.key==='n'||e.key==='N') { e.preventDefault(); openQuickAdd(quickAddPos.x, quickAddPos.y); }
  else if (e.key==='?') { showShortcuts(); }
  else if (e.key==='f'||e.key==='F') { cycleFocus(); }
  else if (e.key==='h'||e.key==='H') { navigate('handoff'); }
  else if (e.key==='l'||e.key==='L') { navigate('log'); }
  else if (e.key==='s'||e.key==='S') { navigate('stats'); }
  else if (e.key==='w'||e.key==='W') { navigate('weekly'); }
  else if (e.key==='p'||e.key==='P') { openNotepad(); }
  else if (currentRoute==='board') {
    if (e.key==='j'||e.key==='J') { e.preventDefault(); moveFocus(1); }
    else if (e.key==='k'||e.key==='K') { e.preventDefault(); moveFocus(-1); }
    else if (e.key==='ArrowRight') { e.preventDefault(); jumpColumn(1); }
    else if (e.key==='ArrowLeft') { e.preventDefault(); jumpColumn(-1); }
    else if (e.key==='Enter' && focusedCardId) { openDetail(focusedCardId); }
    else if (e.key===' ' && focusedCardId) { e.preventDefault(); const t=taskById(focusedCardId); toggleFlag(t); commit('flag'); renderBoard(); }
    else if ((e.key==='m'||e.key==='M') && focusedCardId) { const el=$(`.task-card[data-id="${focusedCardId}"]`); const r=el.getBoundingClientRect(); openCardMenu({clientX:r.right,clientY:r.top}, focusedCardId); }
  }
}
document.addEventListener('mousemove', (e)=>{ quickAddPos={x:e.clientX,y:e.clientY}; }, { passive:true });

/* ============================================================================
   36. RERENDER + BOOT
   ========================================================================== */
function rerenderAll() {
  renderShiftIndicator(); renderHudBadges(); renderUserPill(); renderBell();
  renderAnnouncement(); updateHandoffBanner();
  handleRoute();
}
function wireGlobalChrome() {
  $$('#navTabs button').forEach(b=>b.onclick=()=>navigate(b.dataset.route));
  $('#announceBtn').onclick = openAnnounceModal;
  $('#notepadBtn').onclick = openNotepad;
  $('#syncBtn').onclick = ()=>{ State=loadAndMigrate(); rerenderAll(); updateSyncLabel(); toast('Synced','success'); };
  $('#bellBtn').onclick = (e)=>{ e.stopPropagation(); const dd=$('#notifDropdown'); dd.classList.toggle('show'); if(dd.classList.contains('show')) renderNotifDropdown(); };
  $('#themeBtn').onclick = (e)=>{ e.stopPropagation(); const dd=$('#themeDropdown'); dd.classList.toggle('show'); if(dd.classList.contains('show')) renderThemeDropdown(); };
  $('#userPill').onclick = (e)=>{ e.stopPropagation(); const dd=$('#userDropdown'); dd.classList.toggle('show');
    dd.innerHTML = `<div class="notif-item" id="switchUser">↔ Switch user</div><div class="notif-item muted tiny">Signed in as ${esc(activeUser)}</div>`;
    $('#switchUser').onclick=switchUser; };
  document.addEventListener('click', (e)=>{ if(!e.target.closest('#bellBtn')&&!e.target.closest('#notifDropdown')) $('#notifDropdown').classList.remove('show');
    if(!e.target.closest('#userPill')&&!e.target.closest('#userDropdown')) $('#userDropdown').classList.remove('show');
    if(!e.target.closest('#themeBtn')&&!e.target.closest('#themeDropdown')) $('#themeDropdown').classList.remove('show'); });
  // online/offline
  addEventListener('offline', ()=>{ document.body.classList.add('offline'); });
  addEventListener('online', ()=>{ $('.offline-badge').textContent='⟳ Syncing…'; setTimeout(()=>{ document.body.classList.remove('offline'); $('.offline-badge').textContent='⚠ OFFLINE'; },1200); });
  if (!navigator.onLine) document.body.classList.add('offline');
  document.addEventListener('keydown', handleGlobalKeys);
}
function afterIdentity() {
  applyTheme();
  checkRecurring();
  runAutomations(true);
  wireGlobalChrome();
  rerenderAll();
  updateClock(); setInterval(updateClock, 1000);
  setInterval(()=>{ renderShiftIndicator(); }, 60000);
  setInterval(()=>runAutomations(false), 30*60000); // automation re-check every 30 min
  setInterval(()=>{ if(currentRoute==='board') renderBoard(); }, 60000); // refresh aging/time displays
  registerSW();
  toast(`Welcome, ${activeUser} — ${currentShift()==='day'?'Day':'Night'} shift`, 'success');
}
function registerSW() {
  // Best-effort offline cache. Service workers require http(s); silently skip on file://.
  if (!('serviceWorker' in navigator) || location.protocol==='file:') return;
  try {
    const swCode = `const C='specialist-turnover-v1';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith((async()=>{const c=await caches.open(C);try{const f=await fetch(e.request);if(f&&f.ok)c.put(e.request,f.clone());return f;}catch(_){const r=await c.match(e.request);return r||new Response('offline',{status:503});}})());});`;
    const url = URL.createObjectURL(new Blob([swCode], { type:'text/javascript' }));
    navigator.serviceWorker.register(url).catch(()=>{});
  } catch(e){}
}
function boot() {
  initBackground();
  initBroadcast();
  applyTheme();
  if (resolveIdentity()) afterIdentity();
  else showIdentityModal();
}
boot();
